<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UniBolt - Global Leaderboard</title>
    <link rel="icon" type="image/png" href="UniBolt.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- 3D THEME & LAYOUT --- */
        :root {
            --bg-deep: #0f0e13;
            --card-surface: #1a1920;
            --accent-primary: #8b5cf6;
            --accent-secondary: #ec4899;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --sidebar-width: 250px;
        }

        body {
            background-color: var(--bg-deep);
            font-family: 'Inter', sans-serif;
            margin: 0;
            color: var(--text-main);
            overflow-x: hidden;
        }

        .app-container { display: flex; min-height: 100vh; }

        /* --- SIDEBAR --- */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            position: fixed; 
            left: 0; top: 0;
            background: #111014;
            border-right: 1px solid rgba(255,255,255,0.05);
            padding: 25px 15px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            z-index: 20000;
        }

        .brand {
            font-size: 20px; font-weight: 800; color: white; margin-bottom: 30px;
            padding-left: 10px; text-shadow: 0 0 15px rgba(139, 92, 246, 0.4);
        }

        .nav-menu {
            display: flex; flex-direction: column; gap: 4px;
            flex: 1; padding: 0; margin: 0; list-style: none;
        }

        .nav-item {
            display: flex; align-items: center; gap: 12px; padding: 10px 14px;
            color: var(--text-muted); text-decoration: none; border-radius: 10px;
            margin-bottom: 4px; font-weight: 500; font-size: 14px; transition: 0.2s;
        }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-item.active { 
            background: linear-gradient(90deg, rgba(139, 92, 246, 0.15), transparent); 
            color: var(--accent-primary); border-left: 3px solid var(--accent-primary); 
        }

        .sidebar-footer {
            margin-top: auto; padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        /* --- MAIN CONTENT --- */
        .main-content {
            flex: 1; margin-left: var(--sidebar-width); padding: 30px;
        }

        .top-header { display: none; } /* Hidden on Desktop */

        /* --- DESKTOP LEADERBOARD STYLES --- */
        .podium-container {
            display: grid;
            grid-template-columns: 1fr 1.2fr 1fr;
            gap: 20px;
            align-items: end;
            margin-bottom: 50px;
            max-width: 800px;
            margin-left: auto; margin-right: auto;
        }

        .podium-card {
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            position: relative;
            transition: transform 0.3s ease;
        }

        .rank-1 { border-bottom: 4px solid #ffd700; order: 2; transform: scale(1.1); z-index: 2; box-shadow: 0 10px 40px rgba(255, 215, 0, 0.1); }
        .rank-2 { border-bottom: 4px solid #c0c0c0; order: 1; margin-top: 30px; }
        .rank-3 { border-bottom: 4px solid #cd7f32; order: 3; margin-top: 30px; }

        .avatar {
            margin: 0 auto 15px; width: 60px; height: 60px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 24px;
            border: 2px solid rgba(255,255,255,0.1);
        }
        .rank-1 .avatar { background: #ffd700; color: #000; width: 80px; height: 80px; font-size: 32px; }
        .rank-2 .avatar { background: #c0c0c0; color: #000; }
        .rank-3 .avatar { background: #cd7f32; color: #000; }

        .user-name { font-size: 16px; font-weight: bold; color: white; margin: 0 0 5px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .user-xp { color: #10b981; font-weight: bold; font-size: 14px; margin: 0; }

        /* Table */
        .card-table { background: #18181b; border: 1px solid #27272a; border-radius: 12px; overflow: hidden; }
        .leaderboard-table { width: 100%; border-collapse: collapse; color: #a1a1aa; font-size: 14px; }
        .leaderboard-table th { text-align: left; padding: 15px; border-bottom: 1px solid #27272a; color: #fff; font-size: 12px; text-transform: uppercase; }
        .leaderboard-table td { padding: 15px; border-bottom: 1px solid #222; vertical-align: middle; }
        .row-highlight { background: rgba(6, 182, 212, 0.1) !important; border-left: 3px solid #06b6d4; }

        /* --- MOBILE RESPONSIVE (BENTO GRID STYLE) --- */
        .sidebar-overlay { display: none; }

        @media (max-width: 768px) {
            .app-container { flex-direction: column; }
            .main-content { margin-left: 0; padding: 20px; padding-top: 0; }
            
            /* Sidebar Slide-in */
            .sidebar { transform: translateX(-100%); transition: 0.3s; width: 260px; box-shadow: 50px 0 100px rgba(0,0,0,0.5); }
            .sidebar.active { transform: translateX(0); }
            
            .sidebar-overlay {
                position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                background: rgba(0,0,0,0.6); z-index: 19999; display: none; backdrop-filter: blur(4px);
            }
            .sidebar-overlay.active { display: block; }

            /* Mobile Header */
            .top-header { 
                display: flex; position: sticky; top: 0; z-index: 50; 
                background: rgba(15, 14, 19, 0.85); backdrop-filter: blur(12px); 
                margin: 0 -20px 20px -20px; padding: 15px 20px; 
                border-bottom: 1px solid rgba(255,255,255,0.05); align-items: center; justify-content: space-between;
            }
            
            .mobile-menu-toggle {
                display: flex; align-items: center; justify-content: center;
                background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
                color: white; width: 36px; height: 36px; border-radius: 8px; font-size: 18px;
            }

            /* --- BENTO GRID LAYOUT FOR MOBILE --- */
            .podium-container {
                display: grid;
                grid-template-columns: 1fr 1fr; /* Two Columns */
                grid-template-rows: auto auto; /* Two Rows */
                gap: 12px; /* Tight gap like iPhone widgets */
                align-items: stretch;
                margin-bottom: 25px;
            }

            /* Rank 1: Full Width Widget */
            .rank-1 { 
                grid-column: 1 / -1; /* Spans full width */
                order: 1; 
                transform: none; /* Reset desktop scaling */
                display: flex; 
                align-items: center; 
                justify-content: space-between;
                padding: 15px 20px;
                background: linear-gradient(145deg, #2a2a30, #18181b);
                border: 1px solid rgba(255, 215, 0, 0.3);
                box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            }
            .rank-1 .avatar { margin: 0; width: 50px; height: 50px; font-size: 20px; }
            .rank-1 h3 { text-align: left; margin-left: 15px; flex: 1; font-size: 18px; }
            .rank-1 .user-xp { font-size: 16px; }
            .rank-1 .fa-crown { position: static; transform: none; margin-right: 10px; font-size: 20px; }

            /* Rank 2 & 3: Small Square Widgets */
            .rank-2, .rank-3 {
                order: 2; 
                margin-top: 0; 
                border-bottom: none; /* Remove desktop border */
                background: #202024;
                display: flex; 
                flex-direction: column; 
                justify-content: center;
                padding: 15px;
            }
            .rank-2 { border-top: 3px solid #c0c0c0; }
            .rank-3 { border-top: 3px solid #cd7f32; }
            
            .rank-2 .avatar, .rank-3 .avatar { width: 45px; height: 45px; font-size: 18px; margin-bottom: 10px; }
            .rank-2 h3, .rank-3 h3 { font-size: 14px; }
            .rank-2 p, .rank-3 p { font-size: 12px; }

            /* Compact Header Actions */
            .page-header-flex { display: flex; gap: 10px; flex-direction: column; margin-bottom: 20px; }
            .page-header-flex h1 { font-size: 22px; }
            #filter-course { width: 100%; font-size: 14px; padding: 12px; }

            /* Scrollable Table */
            .table-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; }
            .leaderboard-table th, .leaderboard-table td { padding: 12px 10px; white-space: nowrap; font-size: 13px; }
        }
    </style>
</head>
<body>

    <div id="mobile-sidebar-overlay" class="sidebar-overlay" onclick="toggleMobileSidebar()"></div>

    <div class="app-container">
        
        <aside class="sidebar" id="mobile-sidebar">
            <div class="brand"><i class="fa-solid fa-dna" style="color: #8b5cf6;"></i> UniBolt.</div>
            
            <ul class="nav-menu">
                <a href="/AI" class="nav-item"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
                <a href="/notebooks" class="nav-item"><i class="fa-solid fa-code-branch"></i> Neural Lab</a>
                <a href="/datasets" class="nav-item"><i class="fa-solid fa-database"></i> Datasets</a>
                <a href="/aileaderboard" class="nav-item active"><i class="fa-solid fa-chart-line"></i> Leaderboard</a>
                <a href="/aigallery" class="nav-item "><i class="fa-solid fa-trophy"></i> Hall of Fame</a>
                <a href="/airesearch" class="nav-item"><i class="fa-solid fa-flask"></i> Research Hub</a>
                <a href="/aicontact" class="nav-item"><i class="fa-solid fa-headset"></i> Support</a>
                <a href="/aiprofile" class="nav-item"><i class="fa-solid fa-sliders"></i> Settings</a>
            </ul>

            <div class="sidebar-footer">
                <a href="/login" class="nav-item" style="color: #ef4444;">
                    <i class="fa-solid fa-power-off"></i> Logout
                </a>
            </div>
        </aside>

        <main class="main-content">
            
            <header class="top-header">
                <div style="display: flex; align-items: center;">
                    <button class="mobile-menu-toggle" onclick="toggleMobileSidebar()">
                        <i class="fa-solid fa-bars"></i>
                    </button>
                    <div style="margin-left: 15px; font-weight: 700; font-size: 16px;">Leaderboard</div>
                </div>
            </header>

            <div class="page-body">
                
                <div class="page-header-flex">
                    <div>
                        <h1 style="margin: 0;">Global Rankings 🏆</h1>
                        <p style="color: #666; margin: 5px 0 0; font-size: 14px;">Top students battling for supremacy.</p>
                    </div>
                    
                    <select id="filter-course" style="background: #18181b; border: 1px solid #333; color: #fff; padding: 10px 15px; border-radius: 8px; cursor: pointer; outline: none;">
                        <option value="all">🌍 All Courses</option>
                        <option value="ai">🤖 AI & Data Science</option>
                        <option value="web">💻 Full Stack Web</option>
                        <option value="app">📱 App Development</option>
                    </select>
                </div>

                <div class="podium-container">
                    
                    <div class="podium-card rank-1">
                        <i class="fa-solid fa-crown" style="color: #ffd700;"></i>
                        <div style="display: flex; align-items: center; flex: 1;">
                            <div class="avatar">1</div>
                            <div>
                                <h3 class="user-name" id="r1-name">Leader</h3>
                                <div id="r1-course"></div>
                            </div>
                        </div>
                        <p class="user-xp" id="r1-xp">-- XP</p>
                    </div>

                    <div class="podium-card rank-2">
                        <div class="avatar">2</div>
                        <h3 class="user-name" id="r2-name">Available</h3>
                        <p class="user-xp" id="r2-xp">-- XP</p>
                    </div>

                    <div class="podium-card rank-3">
                        <div class="avatar">3</div>
                        <h3 class="user-name" id="r3-name">Available</h3>
                        <p class="user-xp" id="r3-xp">-- XP</p>
                    </div>

                </div>

                <div class="card-table">
                    <div class="table-wrapper">
                        <table class="leaderboard-table">
                            <thead>
                                <tr>
                                    <th style="width: 50px; text-align: center;">#</th>
                                    <th>Student</th>
                                    <th>Focus</th>
                                    <th>Streak</th>
                                    <th style="text-align: right;">XP</th>
                                </tr>
                            </thead>
                            <tbody id="leaderboard-body">
                                <tr>
                                    <td colspan="5" style="text-align:center; padding:30px; color:#666;">
                                        <i class="fa-solid fa-circle-notch fa-spin"></i> Loading...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script>
        // Toggle Mobile Sidebar Logic
        window.toggleMobileSidebar = function() {
            const sidebar = document.getElementById('mobile-sidebar');
            const overlay = document.getElementById('mobile-sidebar-overlay');
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }
    </script>

    <script type="module" src="js/leaderboard-backend.js"></script>

</body>
</html>
