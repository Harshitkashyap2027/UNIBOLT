<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniBolt Admin - Tickets</title>
    
    <link rel="manifest" href="manifest-admin.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --primary: #ff3b30; 
            --bg: #000000; 
            --surface: #1c1c1e; 
            --surface-highlight: #2c2c2e;
            --text: #ffffff; 
            --text-dim: #8e8e93;
            --border: rgba(255, 255, 255, 0.1); 
            --bento-shadow: 0 20px 40px -10px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            --radius: 24px;
        }

        body { 
            background: var(--bg); 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            color: var(--text); 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* --- SIDEBAR (Standardized) --- */
        .sidebar { 
            width: 280px; 
            background: #000; 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 1100;
            height: 100vh;
        }

        .sidebar-header { padding: 30px 24px 10px; flex-shrink: 0; }
        .sidebar-scroll { flex: 1; overflow-y: auto; padding: 0 14px; }
        .sidebar-footer { padding: 20px 24px; border-top: 1px solid var(--border); background: #000; flex-shrink: 0; }

        .brand { font-size: 22px; font-weight: 700; display: flex; align-items: center; gap: 12px; letter-spacing: -0.5px; }
        
        .nav-item { 
            padding: 14px 16px; 
            color: var(--text-dim); 
            cursor: pointer; 
            border-radius: 14px; 
            margin-bottom: 4px; 
            display: flex; 
            align-items: center; 
            gap: 14px; 
            transition: 0.2s; 
            text-decoration: none; 
            font-size: 15px; 
            font-weight: 500; 
        }
        .nav-item:hover { background: var(--surface); color: white; }
        .nav-item.active { background: var(--surface-highlight); color: white; font-weight: 600; }
        .nav-item i { width: 20px; text-align: center; }

        /* --- MAIN CONTENT --- */
        .main { flex: 1; padding: 30px; overflow-y: auto; background: var(--bg); position: relative; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; gap: 20px; }
        .header h2 { font-size: 32px; font-weight: 700; margin: 0; letter-spacing: -0.5px; }

        .btn { 
            padding: 14px 24px; 
            border-radius: 14px; 
            border: none; 
            cursor: pointer; 
            font-size: 15px; 
            font-weight: 600; 
            color: white; 
            background: var(--surface); 
            transition: 0.2s; 
            display: inline-flex; align-items: center; gap: 8px; 
        }
        .btn:hover { background: var(--surface-highlight); transform: scale(1.02); }
        .btn-primary { background: var(--primary); box-shadow: 0 4px 12px rgba(255, 59, 48, 0.4); }

        /* --- TICKET CARDS --- */
        #ticket-list { display: grid; gap: 16px; }
        .ticket-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--bento-shadow);
            transition: transform 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .ticket-card:hover { transform: translateY(-2px); background: var(--surface-highlight); }
        
        .ticket-info { flex: 1; }
        .ticket-cat { 
            color: var(--primary); 
            font-size: 12px; 
            font-weight: 700; 
            text-transform: uppercase; 
            margin-bottom: 6px; 
            letter-spacing: 0.5px;
        }
        .ticket-msg { font-size: 17px; font-weight: 600; margin: 0 0 8px 0; color: white; line-height: 1.4; }
        .ticket-meta { color: var(--text-dim); font-size: 13px; }

        .status-badge {
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: 0.2s;
        }
        .status-resolved { background: rgba(48, 209, 88, 0.2); color: #30d158; pointer-events: none; }
        .status-pending { background: rgba(255, 159, 10, 0.2); color: #ff9f0a; }
        .status-pending:hover { background: #ff9f0a; color: black; }

        /* --- MOBILE RESPONSIVE --- */
        .menu-toggle { display: none; position: fixed; top: 20px; right: 20px; z-index: 1200; background: var(--surface); border: 1px solid var(--border); color: white; width: 44px; height: 44px; border-radius: 12px; cursor: pointer; align-items: center; justify-content: center; font-size: 20px; }
        .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); z-index: 1050; }

        @media (max-width: 768px) {
            .sidebar { position: fixed; left: 0; top: 0; transform: translateX(-105%); height: 100vh; visibility: hidden; }
            .sidebar.active { transform: translateX(0); visibility: visible; }
            .sidebar-overlay.active { display: block; }
            .menu-toggle { display: flex; }
            .main { padding: 90px 20px 40px; }
            
            .ticket-card { flex-direction: column; align-items: flex-start; gap: 15px; }
            .status-badge { width: 100%; }
        }

        /* --- MODAL & TOAST --- */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(20px); display: flex; justify-content: center; align-items: center; z-index: 2000; visibility: hidden; opacity: 0; transition: 0.3s; padding: 20px; }
        .modal.active { visibility: visible; opacity: 1; }
        .modal-content { 
            background: #1c1c1e; width: 100%; max-width: 350px; padding: 30px; 
            border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); 
            text-align: center; box-shadow: 0 40px 80px rgba(0,0,0,0.6); 
            transform: scale(0.95); transition: 0.3s;
        }
        .modal.active .modal-content { transform: scale(1); }

        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: rgba(255,255,255,0.1); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px 24px; border-radius: 50px; font-weight: 600; transition: 0.4s; z-index: 3000; opacity: 0; display: flex; gap: 10px; align-items: center; }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    </style>
</head>
<body>

    <button class="menu-toggle" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
    <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="modal" id="confirm-modal">
        <div class="modal-content">
            <div style="font-size: 48px; margin-bottom: 20px;">✅</div>
            <h2 style="margin: 0 0 10px 0; font-size: 22px;">Resolve Ticket?</h2>
            <p style="color: var(--text-dim); font-size: 15px; margin-bottom: 30px;">Mark this issue as solved for the user.</p>
            <div style="display: flex; gap: 12px;">
                <button id="confirm-yes" class="btn btn-primary" style="flex: 1; justify-content: center; background: #30d158;">Yes, Solve</button>
                <button onclick="closeModal()" class="btn" style="flex: 1; justify-content: center; background: #2c2c2e;">Cancel</button>
            </div>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="brand"><i class="fa-solid fa-shield-cat" style="color:var(--primary);"></i> UniBolt Admin</div>
        </div>
        <div class="sidebar-scroll">
            <a href="admin.html" class="nav-item"><i class="fa-solid fa-grid-2"></i> Overview</a>
            <a href="admin-tickets.html" class="nav-item active"><i class="fa-solid fa-ticket"></i> Tickets</a>
            <a href="admin-analytics.html" class="nav-item"><i class="fa-solid fa-chart-pie"></i> Analytics</a>
            <a href="admin-reports.html" class="nav-item"><i class="fa-solid fa-file-contract"></i> Reports</a>
            <a href="admin-content.html" class="nav-item"><i class="fa-solid fa-book-open"></i> Content</a>
            <a href="admin-activity.html" class="nav-item"><i class="fa-solid fa-clock-rotate-left"></i> Activity</a>
            <a href="admin-registrations.html" class="nav-item"><i class="fa-solid fa-address-card"></i> Registrations</a>
            <a href="admin-settings.html" class="nav-item"><i class="fa-solid fa-gear"></i> Settings</a>
            <a href="admin-notifications.html" class="nav-item"><i class="fa-solid fa-bell"></i> Notifications</a>
            <a href="admin-team.html" class="nav-item"><i class="fa-solid fa-user-shield"></i> Team</a>
            <a href="admin-faq.html" class="nav-item"><i class="fa-solid fa-circle-question"></i> FAQ</a>
        </div>
        <div class="sidebar-footer">
            <div class="nav-item" onclick="logout()" style="color: #ff453a;"><i class="fa-solid fa-power-off"></i> Sign Out</div>
        </div>
    </div>

    <div class="main">
        <div class="header">
            <h2>Support Tickets</h2>
            <button class="btn btn-primary" onclick="loadTickets()"><i class="fa-solid fa-rotate"></i> Refresh</button>
        </div>
        <div id="ticket-list"></div>
    </div>

    <div class="toast" id="toast"><i class="fa-solid fa-circle-check" style="color:#30d158;"></i> <span id="toast-msg">Success</span></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, getDocs, doc, updateDoc, getDoc, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCLaf8yGis2vT0DA4HlGlXXBKgFoCNGfDY",
            authDomain: "unibolt-f7005.firebaseapp.com",
            projectId: "unibolt-f7005",
            storageBucket: "unibolt-f7005.appspot.com",
            messagingSenderId: "121987854250",
            appId: "1:121987854250:web:21a9f50aad54b2143a85d3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // --- 🔒 ADVANCED SECURITY GUARD ---
        onAuthStateChanged(auth, async (user) => {
            if (user && user.email === "admin@unibolt.in") {
                // ✅ ADMIN VERIFIED: LOAD TICKETS
                loadTickets();
            } else {
                // ⛔ INTRUDER DETECTED
                
                // 1. Fetch IP Data (Silent)
                let ip = "TRACING...";
                let location = "Unknown";
                let provider = "Unknown Network";
                let sessionID = "BREACH-" + Math.floor(Math.random() * 99999);

                try {
                    const r = await fetch('https://ipapi.co/json/');
                    const d = await r.json();
                    ip = d.ip || "Unknown IP";
                    location = (d.city ? d.city + ", " : "") + (d.country_name || "");
                    provider = d.org || "Hidden ISP";
                } catch(e) {
                    try { const r2 = await fetch('https://api.ipify.org?format=json'); const d2 = await r2.json(); ip = d2.ip; } catch(err){}
                }

                // 2. Check Block
                try {
                    const blockSnap = await getDoc(doc(db, "blocked_ips", ip));
                    if (blockSnap.exists()) { window.location.href = "security.html"; return; }
                } catch(e) {}

                // 3. Log
                try {
                    await addDoc(collection(db, "security_logs"), {
                        ip: ip,
                        location: location,
                        provider: provider,
                        page: window.location.pathname,
                        userAgent: navigator.userAgent,
                        timestamp: serverTimestamp(),
                        status: "BLOCKED",
                        session_id: sessionID
                    });
                } catch(e) {}

                // 4. Show Warning Popup
                document.body.innerHTML = `
                    <style>
                        body { margin: 0; background: #050505; font-family: 'Courier New', monospace; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
                        .hack-box {
                            background: #000; border: 2px solid #ef4444; padding: 40px; width: 90%; max-width: 600px;
                            border-radius: 4px; text-align: left; box-shadow: 0 0 50px rgba(239, 68, 68, 0.4), inset 0 0 20px rgba(239, 68, 68, 0.2);
                            position: relative; animation: glitch 0.2s infinite; z-index:9999;
                        }
                        .hack-box::before { content: "SYSTEM BREACH DETECTED"; position: absolute; top: -12px; left: 20px; background: #000; color: #ef4444; padding: 0 10px; font-weight: bold; border: 1px solid #ef4444; }
                        h1 { color: #ef4444; font-size: 32px; margin: 0 0 20px 0; text-transform: uppercase; font-weight: 900; letter-spacing: 2px; }
                        p { color: #fff; font-size: 14px; margin-bottom: 10px; line-height: 1.6; }
                        .data-terminal { background: #111; border: 1px solid #333; padding: 15px; margin-top: 20px; font-size: 12px; color: #0f0; }
                        .blink { animation: blink 1s infinite; }
                        @keyframes glitch { 0% { transform: translate(0); } 20% { transform: translate(-2px, 2px); } 100% { transform: translate(0); } }
                        @keyframes blink { 50% { opacity: 0; } }
                    </style>
                    <div class="hack-box">
                        <h1>⚠️ ACCESS DENIED ⚠️</h1>
                        <p>You have attempted to access a restricted administrative terminal.</p>
                        <div class="data-terminal">
                            > TRACE ID: <span style="color:#fff">${sessionID}</span><br>
                            > TARGET IP: <span style="color:#fff">${ip}</span> <span style="color:#ef4444">[LOCKED]</span><br>
                            > LOCATION: <span style="color:#fff">${location}</span><br>
                            > PROVIDER: <span style="color:#fff">${provider}</span><br>
                            > UPLOADING LOGS TO SERVER... <span style="color:#ef4444">100%</span><span class="blink">_</span>
                        </div>
                    </div>
                `;

                setTimeout(() => { window.location.href = "mail-login.html"; }, 7000);
            }
        });

        // --- GLOBAL UTILS ---
        window.showToast = function(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        window.closeModal = function() { document.getElementById('confirm-modal').classList.remove('active'); }

        window.logout = function() {
            if(confirm("Log out?")) signOut(auth).then(() => window.location.href = "index.html");
        }

        // --- TICKET LOGIC ---
        window.loadTickets = async () => {
            const list = document.getElementById("ticket-list");
            list.innerHTML = '<p style="color:#8e8e93; text-align:center; padding:40px;">Fetching Tickets...</p>';
            
            try {
                const snap = await getDocs(collection(db, "users"));
                let allTickets = [];

                snap.forEach(doc => {
                    const data = doc.data();
                    if(data.tickets && Array.isArray(data.tickets)){
                        data.tickets.forEach(t => {
                            allTickets.push({ ...t, uid: doc.id, email: data.email });
                        });
                    }
                });

                allTickets.sort((a, b) => b.id - a.id);
                list.innerHTML = "";
                
                if(allTickets.length === 0) {
                    list.innerHTML = `<div style="text-align:center; padding:50px; color:#8e8e93;">
                        <i class="fa-solid fa-box-open" style="font-size:40px; margin-bottom:10px; opacity:0.5;"></i>
                        <p>No tickets found</p>
                    </div>`;
                    return;
                }

                allTickets.forEach(t => {
                    const isResolved = t.status === "Resolved";
                    const div = document.createElement("div");
                    div.className = "ticket-card";
                    div.innerHTML = `
                        <div class="ticket-info">
                            <div class="ticket-cat"><i class="fa-solid fa-tag"></i> ${t.category || "General"}</div>
                            <div class="ticket-msg">${t.message}</div>
                            <div class="ticket-meta">
                                <i class="fa-regular fa-envelope"></i> ${t.email} &nbsp;•&nbsp; 
                                <i class="fa-regular fa-clock"></i> ${t.date}
                            </div>
                        </div>
                        <button onclick="window.solveTicket('${t.uid}', ${t.id})" 
                            class="status-badge ${isResolved ? 'status-resolved' : 'status-pending'}">
                            ${isResolved ? '<i class="fa-solid fa-check"></i> Resolved' : 'Mark Solved'}
                        </button>
                    `;
                    list.appendChild(div);
                });
            } catch (e) {
                list.innerHTML = `<p style="color:#ff453a; text-align:center;">Error loading tickets.</p>`;
            }
        };

        window.solveTicket = function(uid, tid) {
            const modal = document.getElementById('confirm-modal');
            const btn = document.getElementById('confirm-yes');
            modal.classList.add('active');

            const newBtn = btn.cloneNode(true);
            btn.parentNode.replaceChild(newBtn, btn);
            
            newBtn.onclick = async () => {
                modal.classList.remove('active');
                try {
                    const ref = doc(db, "users", uid);
                    const s = await getDoc(ref);
                    let tickets = s.data().tickets;
                    tickets = tickets.map(t => t.id === tid ? {...t, status: "Resolved"} : t);
                    await updateDoc(ref, { tickets });
                    window.showToast("Ticket Resolved");
                    loadTickets();
                } catch(e) { window.showToast("Update Failed"); }
            };
        };

        // --- MOBILE MENU ---
        window.toggleSidebar = function() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }
    </script>
</body>
</html>
