<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>UniBolt - Task Solver</title>
    <link rel="icon" type="image/png" href="UniBolt.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

    <style>
        /* --- SOLVER THEME --- */
        :root {
            --bg-deep: #09090b;
            --panel-bg: #18181b;
            --accent-primary: #8b5cf6;
            --accent-success: #10b981;
            --accent-danger: #ef4444;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
        }

        body {
            background-color: var(--bg-deep);
            font-family: 'Inter', sans-serif;
            margin: 0;
            color: var(--text-main);
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* TOP NAVIGATION */
        .top-bar {
            height: 60px; background: #111; border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-between; align-items: center; padding: 0 20px;
        }
        .back-btn { 
            color: var(--text-muted); text-decoration: none; font-size: 13px; font-weight: 500;
            display: flex; align-items: center; gap: 8px; transition: 0.2s;
        }
        .back-btn:hover { color: white; }

        /* SPLIT WORKSPACE */
        .workspace {
            display: grid;
            grid-template-columns: 350px 1fr; /* Task Info | Code Editor */
            height: calc(100vh - 60px);
        }

        /* LEFT: TASK PANEL */
        .task-panel {
            background: var(--panel-bg);
            border-right: 1px solid rgba(255,255,255,0.05);
            padding: 25px;
            overflow-y: auto;
            display: flex; flex-direction: column;
        }
        
        .timer-box {
            background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--accent-danger); padding: 15px; border-radius: 12px; text-align: center;
            font-family: 'Fira Code', monospace; font-weight: 700; font-size: 24px;
            margin-bottom: 25px; box-shadow: 0 0 20px rgba(239, 68, 68, 0.1);
        }

        .task-tag {
            background: rgba(139, 92, 246, 0.1); color: var(--accent-primary);
            padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 600;
            display: inline-block; margin-bottom: 15px; border: 1px solid rgba(139, 92, 246, 0.3);
            align-self: flex-start;
        }

        /* RIGHT: EDITOR PANEL */
        .editor-panel {
            display: flex; flex-direction: column; background: #1e1e1e;
        }

        .editor-toolbar {
            height: 45px; background: #202023; border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex; align-items: center; padding: 0 20px; justify-content: flex-end;
        }

        .code-area {
            flex: 1; background: #121212; color: #e4e4e7; border: none; padding: 25px;
            font-family: 'Fira Code', monospace; font-size: 14px; line-height: 1.6; 
            resize: none; outline: none;
        }

        /* TERMINAL / NOTIFICATIONS */
        .console-box {
            height: 180px; background: #000; border-top: 1px solid rgba(255,255,255,0.1);
            padding: 20px; font-family: 'Fira Code', monospace; font-size: 13px; color: #a1a1aa;
            overflow-y: auto;
        }

        /* BUTTONS */
        .btn-run {
            background: var(--accent-success); color: white; border: none; padding: 8px 24px;
            border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 13px;
            display: flex; align-items: center; gap: 8px; transition: 0.2s;
        }
        .btn-run:hover { background: #059669; box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); }
        .btn-run:disabled { background: #333; cursor: not-allowed; opacity: 0.6; box-shadow: none; }

        /* MODAL */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(5px);
            z-index: 100; display: none; justify-content: center; align-items: center;
        }
        .modal-content {
            background: #18181b; padding: 40px; border-radius: 24px; text-align: center;
            border: 1px solid var(--accent-success); box-shadow: 0 0 60px rgba(16, 185, 129, 0.15);
            width: 350px; animation: popIn 0.3s ease;
        }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* MOBILE RESPONSIVE */
        @media (max-width: 768px) {
            body { overflow: auto; }
            .workspace { grid-template-columns: 1fr; grid-template-rows: auto 1fr; height: auto; }
            .task-panel { height: auto; border-right: none; border-bottom: 1px solid #333; }
            .code-area { height: 400px; }
        }
    </style>
</head>
<body>

    <div id="result-modal" class="modal-overlay">
        <div class="modal-content">
            <div style="font-size: 60px; margin-bottom: 15px;">🎉</div>
            <h2 style="color: white; margin: 0;">Task Solved!</h2>
            <p style="color: var(--text-muted); margin: 10px 0 25px;">You have successfully completed this module.</p>
            
            <div style="background: rgba(16, 185, 129, 0.1); padding: 15px; border-radius: 12px; color: var(--accent-success); font-weight: 800; font-size: 28px; margin-bottom: 25px; border: 1px dashed #10b981;">
                +15 XP
            </div>

            <button onclick="window.location.href='datasets.html'" style="width: 100%; padding: 14px; background: var(--accent-success); border: none; border-radius: 10px; color: white; cursor: pointer; font-weight: 600;">
                Return to Curriculum
            </button>
        </div>
    </div>

    <div class="top-bar">
        <a href="datasets.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> &nbsp; Back to List</a>
        <div style="font-size: 14px; font-weight: 600; color: white;" id="header-title">Loading Task...</div>
        <div style="width: 80px;"></div> </div>

    <div class="workspace">
        
        <div class="task-panel">
            <div class="timer-box">
                <i class="fa-regular fa-clock"></i> <span id="timer">45:00</span>
            </div>
            
            <span class="task-tag" id="task-cat">Loading...</span>
            <h1 style="font-size: 24px; color: white; margin: 0 0 15px; line-height: 1.3;" id="task-title">Loading...</h1>
            
            <p style="font-size: 14px; line-height: 1.7; color: #bbb;" id="task-desc">
                Fetching details...
            </p>

            <div style="margin-top: auto; padding-top: 25px; border-top: 1px solid rgba(255,255,255,0.1);">
                <div style="font-size: 11px; color: #666; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px;">Attempts Remaining</div>
                <div style="font-size: 24px; color: white; font-weight: 700;" id="attempts-display">5</div>
            </div>
        </div>

        <div class="editor-panel">
            <div class="editor-toolbar">
                <button class="btn-run" id="run-btn">
                    <i class="fa-solid fa-play"></i> &nbsp; Run Solution
                </button>
            </div>
            
            <textarea class="code-area" id="code-editor" spellcheck="false">
# Write your solution here...

def solve_task():
    # Your logic goes here
    return "Result"

print(solve_task())
            </textarea>

            <div class="console-box">
                <div style="border-bottom: 1px solid #333; padding-bottom: 8px; margin-bottom: 15px; color: #666; font-size: 11px; font-weight: 700; letter-spacing: 1px;">TERMINAL / NOTIFICATIONS</div>
                <div id="console-output">
                    > Environment Initialized.<br>
                    > Ready for input...
                </div>
            </div>
        </div>

    </div>

    <script src="js/solver-backend.js"></script>
</body>
</html>
