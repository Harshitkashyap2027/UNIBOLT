<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>UniBolt - Code Arena</title>
    <link rel="icon" type="image/png" href="UniBolt.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        /* =========================================
           CORE THEME
           ========================================= */
        :root {
            --bg-deep: #0f0e13;
            --sidebar-bg: #050507;
            --card-surface: #1a1920;
            --accent-primary: #10b981; /* Green for Arena */
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255,255,255,0.08);
            --sidebar-width: 260px;
        }

        body {
            background-color: var(--bg-deep);
            font-family: 'Outfit', sans-serif;
            margin: 0; color: var(--text-main);
            overflow: hidden; /* Desktop: Prevent scroll */
            height: 100vh;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        /* --- LAYOUT --- */
        .app-container { display: flex; height: 100vh; }
        
        /* --- SIDEBAR --- */
        .sidebar {
            width: var(--sidebar-width); height: 100vh;
            background: var(--sidebar-bg); border-right: 1px solid var(--border);
            padding: 25px 20px; display: flex; flex-direction: column;
            z-index: 1001; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: fixed; top: 0; left: 0; /* Fixed to ensure consistency */
        }
        .brand { font-size: 22px; font-weight: 800; color: white; margin-bottom: 40px; display: flex; align-items: center; gap: 10px; }
        .nav-menu { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .nav-item {
            display: flex; align-items: center; gap: 14px; padding: 12px 16px;
            color: var(--text-muted); text-decoration: none; border-radius: 12px;
            font-weight: 500; font-size: 15px; transition: 0.2s;
        }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-item.active { background: rgba(16, 185, 129, 0.15); color: var(--accent-primary); border-left: 3px solid var(--accent-primary); padding-left: 13px; }

        /* --- MAIN CONTENT --- */
        .main-content {
            flex: 1; margin-left: var(--sidebar-width); /* Push content right on Desktop */
            display: flex; flex-direction: column;
            width: 100%; height: 100%; overflow: hidden; position: relative;
        }

        /* Mobile Header (Hidden on Desktop) */
        .mobile-header {
            display: none; align-items: center; justify-content: space-between;
            padding: 15px 20px; background: var(--bg-deep); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 50;
        }
        .mobile-menu-toggle {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            color: white; width: 40px; height: 40px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center; font-size: 18px;
            cursor: pointer;
        }

        /* --- EDITOR LAYOUT --- */
        .page-body {
            flex: 1; padding: 20px; overflow: hidden;
            display: flex; flex-direction: column;
        }

        .editor-frame {
            display: grid; 
            grid-template-columns: 350px 1fr; /* Task Pane | Code Pane */
            gap: 20px; 
            height: 100%;
        }

        /* Task Pane */
        .task-pane {
            background: var(--card-surface); border: 1px solid var(--border);
            border-radius: 16px; padding: 25px; overflow-y: auto;
        }
        .xp-pill {
            background: rgba(16, 185, 129, 0.1); color: #10b981;
            padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; border: 1px solid rgba(16, 185, 129, 0.2);
        }

        /* Code Pane */
        .code-pane {
            display: flex; flex-direction: column;
            background: #111; border: 1px solid var(--border);
            border-radius: 16px; overflow: hidden;
        }
        
        .code-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 15px; background: #18181b; border-bottom: 1px solid var(--border);
        }
        
        .btn-primary {
            background: var(--accent-primary); color: #000; border: none;
            padding: 8px 16px; border-radius: 8px; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; gap: 8px; transition: 0.2s;
        }
        .btn-primary:active { transform: scale(0.95); }

        .code-area {
            flex: 1; background: #0d0d0d; color: #e0e0e0; border: none;
            padding: 15px; font-family: 'Fira Code', monospace; font-size: 14px;
            line-height: 1.5; resize: none; outline: none;
        }

        /* --- MOBILE RESPONSIVE --- */
        .sidebar-overlay { display: none; }

        @media (max-width: 768px) {
            body { overflow-y: auto; height: auto; } /* Allow full page scroll */
            .app-container { flex-direction: column; height: auto; }
            .main-content { margin-left: 0; overflow: visible; height: auto; }

            /* 1. Sidebar Logic (Hidden by default, slides in) */
            .sidebar {
                transform: translateX(-100%);
                box-shadow: 10px 0 30px rgba(0,0,0,0.5);
            }
            .sidebar.active { transform: translateX(0); }
            
            .sidebar-overlay {
                position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                background: rgba(0,0,0,0.7); backdrop-filter: blur(3px);
                z-index: 1000; display: none;
            }
            .sidebar-overlay.active { display: block; }

            /* 2. Header Logic */
            .mobile-header { display: flex; }

            /* 3. Editor Logic (Stacked) */
            .page-body { padding: 15px; height: auto; overflow: visible; }
            
            .editor-frame {
                display: flex; flex-direction: column; /* Stack vertically */
                height: auto; gap: 20px;
                padding-bottom: 50px; /* Space at bottom */
            }

            .task-pane {
                max-height: 300px; /* Constrain height so user can scroll nicely */
                min-height: 200px;
            }

            .code-pane {
                height: 80vh; /* Make code editor tall */
            }
        }

        /* --- MODAL --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2000;
            display: flex; justify-content: center; align-items: center;
        }
        .hidden { display: none !important; }
        .modal-content {
            background: #1a1920; padding: 30px; border-radius: 20px;
            text-align: center; border: 1px solid var(--border); width: 90%; max-width: 350px;
            animation: popIn 0.3s ease;
        }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <div id="result-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div id="modal-icon" style="font-size: 60px; margin-bottom: 20px;">🎉</div>
            <h2 id="modal-title" style="margin: 0; font-size: 28px; color: white;">Mission Complete!</h2>
            <p id="modal-msg" style="color: #a1a1aa; margin: 10px 0;">You crushed it.</p>
            
            <div style="background: rgba(16, 185, 129, 0.1); padding: 10px; border-radius: 12px; margin: 20px 0; border: 1px dashed #10b981;">
                <span id="modal-xp" style="font-size: 32px; font-weight: 800; color: #10b981;">+5 XP</span>
            </div>

            <button id="modal-btn" class="btn-primary" style="width: 100%; justify-content: center; margin-top: 10px;">
                Continue <i class="fa-solid fa-arrow-right"></i>
            </button>
        </div>
    </div>

    <div id="sidebar-overlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <div class="app-container">
        
        <aside class="sidebar" id="mobile-sidebar">
            <div class="brand"><i class="fa-solid fa-code" style="color: #10b981;"></i> UniBolt.</div>
            <ul class="nav-menu">
                <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-bolt"></i> Dashboard</a>
                <a href="arena.html" class="nav-item active"><i class="fa-solid fa-code"></i> Code Arena</a>
                <a href="practice.html" class="nav-item"><i class="fa-solid fa-dumbbell"></i> Practice Zone</a>
                <a href="leaderboard.html" class="nav-item"><i class="fa-solid fa-chart-line"></i> Leaderboard</a>
                <a href="gallery.html" class="nav-item"><i class="fa-solid fa-trophy"></i> Hall of Fame</a>
                <a href="research.html" class="nav-item"><i class="fa-solid fa-flask"></i> Research Hub</a>
                <a href="contact.html" class="nav-item"><i class="fa-solid fa-headset"></i> Support</a>
                <a href="profile.html" class="nav-item"><i class="fa-solid fa-gear"></i> Settings</a>
            </ul>
        </aside>

        <main class="main-content">
            
            <header class="mobile-header">
                <button class="mobile-menu-toggle" onclick="toggleSidebar()">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <div style="font-weight: 700; font-size: 18px; color: white;">Code Arena</div>
                <div style="width: 40px;"></div> </header>

            <div class="page-body"> 
                
                <div class="editor-frame">
                    
                    <div class="task-pane">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <span class="xp-pill" id="task-badge">Loading...</span>
                            <span style="color: #ef4444; font-weight: bold; font-family: monospace;" id="timer">45:00</span>
                        </div>
                        
                        <h1 style="font-size: 24px; margin-top: 20px; color: white;" id="task-title">Loading...</h1>
                        <p style="color: var(--text-muted); line-height: 1.6;" id="task-desc">
                            Fetching data...
                        </p>
                    </div>

                    <div class="code-pane">
                        <div class="code-header">
                            <span style="color: var(--text-muted); font-size: 13px;"> <i class="fa-brands fa-js"></i> script.js</span>
                            <button class="btn-primary" id="run-btn" style="padding: 6px 15px; font-size: 12px;">
                                <i class="fa-solid fa-play"></i> Run Code
                            </button>
                        </div>
                        
                        <textarea class="code-area" id="code-editor" spellcheck="false" placeholder="// Write your code here..."></textarea>
                        
                        <iframe id="preview-frame" style="background: white; width: 100%; height: 35%; border:none; border-top: 1px solid #333;"></iframe>
                        
                        <div style="height: 120px; background: #111; border-top: 1px solid var(--border); padding: 15px; font-family: 'Fira Code', monospace; font-size: 13px; overflow-y: auto;">
                            <div style="color: var(--text-muted); margin-bottom: 5px;">Console:</div>
                            <div id="console-output" style="color: #aaa;">Ready...</div>
                        </div>
                    </div>

                </div>
            </div>
        </main>
    </div>

    <script type="module" src="js/arena-backend.js"></script>

    <script>
        function toggleSidebar() {
            document.getElementById('mobile-sidebar').classList.toggle('active');
            document.getElementById('sidebar-overlay').classList.toggle('active');
        }
    </script>
</body>
</html>
