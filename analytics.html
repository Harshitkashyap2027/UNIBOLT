<!DOCTYPE html>
<html lang="en">
<head>
    
    <meta charset="UTF-8">
    <title>UniBolt - Analytics</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <style>
        /* Dark Theme + Grid for Charts */
        body { background: #09090b; color: #e4e4e7; font-family: 'Outfit', sans-serif; display: flex; margin: 0; }
        .sidebar { width: 260px; background: #000; border-right: 1px solid #27272a; height: 100vh; position: fixed; padding: 20px; }
        .main-content { flex: 1; margin-left: 260px; padding: 30px; }
        .nav-item { display: flex; align-items: center; gap: 12px; color: #a1a1aa; text-decoration: none; padding: 12px; margin-bottom: 5px; border-radius: 8px; font-size: 13px; }
        .nav-item:hover, .nav-item.active { background: #27272a; color: white; }
        .nav-item.active { border-left: 3px solid #ef4444; }

        .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .chart-card { background: #18181b; border: 1px solid #27272a; padding: 20px; border-radius: 12px; height: 350px; }
        .full-width { grid-column: span 2; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <h2 style="color:white; margin-top:0;">Admin<span style="color:#ef4444">PRO</span></h2>
        <nav>
            <a href="admin.html" class="nav-item"><i class="fa-solid fa-layer-group"></i> Dashboard</a>
            <a href="students.html" class="nav-item"><i class="fa-solid fa-users"></i> Students</a>
            <a href="analytics.html" class="nav-item active"><i class="fa-solid fa-chart-pie"></i> Analytics</a>
            <a href="bugs.html" class="nav-item"><i class="fa-solid fa-bug"></i> Bug Reports</a>
        </nav>
    </aside>

    <main class="main-content">
        <h1 style="margin-bottom: 10px;">Platform Analytics</h1>
        <p style="color:#666; margin-top:0;">Deep dive into performance metrics.</p>

        <div class="chart-grid">
            <div class="chart-card full-width">
                <h3 style="margin:0 0 15px 0;">Revenue Growth (Last 6 Months)</h3>
                <canvas id="revenueChart"></canvas>
            </div>
            
            <div class="chart-card">
                <h3 style="margin:0 0 15px 0;">Student Distribution</h3>
                <canvas id="distChart"></canvas>
            </div>

            <div class="chart-card">
                <h3 style="margin:0 0 15px 0;">Average User Skills</h3>
                <canvas id="skillChart"></canvas>
            </div>
        </div>
    </main>

    <script type="module" src="js/admin-analytics.js"></script>
</body>
</html>
