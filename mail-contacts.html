<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniBolt Admin - Students</title>
    
    <link rel="manifest" href="mail-manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/732/732200.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --primary: #ef4444; 
            --bg: #000000; 
            --surface: #1c1c1e; 
            --surface-highlight: #2c2c2e;
            --text: #ffffff; 
            --text-dim: #8e8e93;
            --border: rgba(255, 255, 255, 0.1); 
            --bento-shadow: 0 20px 40px -10px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            --radius: 24px;
        }

        body { 
            background: var(--bg); 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            color: var(--text); 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* --- SIDEBAR (FIXED Z-INDEX) --- */
        .sidebar { 
            width: 280px; 
            background: #000; 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            z-index: 2000; 
            height: 100vh;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sidebar-header { padding: 30px 24px 10px; }
        .brand { font-size: 22px; font-weight: 800; display: flex; align-items: center; gap: 10px; color: white; letter-spacing: -0.5px; }
        .brand i { color: var(--primary); }
        
        .nav-link { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            padding: 14px 24px; 
            color: #a1a1aa; 
            text-decoration: none; 
            font-weight: 600; 
            transition: 0.2s; 
            border-left: 3px solid transparent; 
            font-size: 15px; 
        }
        .nav-link i { width: 20px; text-align: center; }
        .nav-link:hover { color: white; background: rgba(255,255,255,0.03); }
        .nav-link.active { border-left-color: var(--primary); background: rgba(239, 68, 68, 0.08); color: var(--primary); }

        /* --- MAIN CONTENT --- */
        .main { flex: 1; padding: 30px; overflow-y: auto; background: var(--bg); position: relative; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; gap: 20px; }
        .header h2 { font-size: 32px; font-weight: 700; margin: 0; letter-spacing: -0.5px; }
        .header p { color: var(--text-dim); margin: 0; font-size: 14px; }

        /* PWA Button */
        .install-btn {
            display: none; 
            background: var(--primary); color: white; border: none;
            padding: 0 16px; height: 40px; border-radius: 12px;
            font-weight: 700; cursor: pointer; align-items: center; gap: 8px;
            font-size: 14px; transition: 0.2s; margin-left: auto;
        }
        .install-btn:hover { background: #dc2626; transform: translateY(-2px); }

        /* Search Bar */
        .search-container { position: relative; width: 300px; }
        .search-container i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-dim); }
        .search-bar { 
            width: 100%; background: var(--surface); border: none; color: white; 
            padding: 14px 14px 14px 40px; border-radius: 14px; outline: none; font-size: 15px; 
            box-shadow: inset 0 0 0 1px var(--border);
        }
        .search-bar:focus { background: var(--surface-highlight); box-shadow: inset 0 0 0 1px var(--primary); }

        /* --- STUDENT GRID --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; padding-bottom: 80px; }
        
        .card { 
            background: var(--surface); border-radius: 20px; padding: 24px; text-align: center; 
            position: relative; box-shadow: var(--bento-shadow); transition: 0.2s; border: 1px solid transparent;
            cursor: pointer;
        }
        .card:hover { transform: translateY(-4px); background: var(--surface-highlight); border-color: rgba(255,255,255,0.1); }
        .card.selected { border-color: var(--primary); background: rgba(239, 68, 68, 0.05); }

        .avt { 
            width: 72px; height: 72px; background: #000; border-radius: 50%; margin: 0 auto 16px; 
            display: flex; align-items: center; justify-content: center; font-size: 32px; 
            border: 2px solid var(--surface-highlight);
        }
        
        .name { font-size: 17px; font-weight: 700; color: white; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .email { font-size: 12px; color: var(--text-dim); margin-bottom: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .stats-row { display: flex; justify-content: center; gap: 8px; }
        .pill { 
            background: rgba(255,255,255,0.05); color: var(--text-dim); 
            padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: 600; 
            display: flex; align-items: center; gap: 6px;
        }
        .pill i { color: #f59e0b; }

        /* Checkbox */
        .check-wrapper { position: absolute; top: 16px; right: 16px; z-index: 10; }
        .check { width: 20px; height: 20px; accent-color: var(--primary); cursor: pointer; transform: scale(1.2); }

        /* --- BULK ACTION BAR --- */
        .bulk-bar {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-35%) translateY(150%);
            background: rgba(28, 28, 30, 0.9); backdrop-filter: blur(20px);
            padding: 12px 12px 12px 24px; border-radius: 50px;
            display: flex; align-items: center; gap: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid var(--border);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 100;
        }
        .bulk-bar.active { transform: translateX(-35%) translateY(0); }
        .bulk-count { color: white; font-weight: 600; font-size: 14px; }
        .bulk-btn { 
            background: var(--primary); color: white; border: none; padding: 10px 24px; 
            border-radius: 40px; font-weight: 700; cursor: pointer; font-size: 13px;
            transition: 0.2s;
        }
        .bulk-btn:hover { background: #dc2626; transform: scale(1.05); }

        /* --- MODAL --- */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); display: flex; justify-content: center; align-items: center; z-index: 2000; visibility: hidden; opacity: 0; transition: 0.3s; padding: 20px; }
        .modal.active { visibility: visible; opacity: 1; }
        .modal-content { 
            background: #1c1c1e; width: 100%; max-width: 450px; 
            padding: 30px; border-radius: 24px; border: 1px solid var(--border); 
            box-shadow: 0 40px 80px rgba(0,0,0,0.6); transform: scale(0.95); transition: 0.3s; 
        }
        .modal.active .modal-content { transform: scale(1); }

        .profile-header { text-align: center; margin-bottom: 24px; }
        .profile-avt { width: 80px; height: 80px; background: #000; border-radius: 50%; margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; font-size: 40px; border: 2px solid var(--primary); }
        
        .info-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .info-label { color: var(--text-dim); font-size: 13px; }
        .info-val { color: white; font-weight: 500; font-size: 13px; }

        .modal-actions { display: flex; gap: 10px; margin-top: 24px; }
        .btn { flex: 1; padding: 12px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; font-size: 14px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-sec { background: #2c2c2e; color: white; }

        /* --- MOBILE --- */
        .menu-toggle { display: none; position: fixed; top: 20px; right: 20px; z-index: 2100; background: var(--surface); border: 1px solid var(--border); color: white; width: 44px; height: 44px; border-radius: 12px; cursor: pointer; align-items: center; justify-content: center; font-size: 20px; }
        .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); z-index: 1500; }

        @media (max-width: 768px) {
            .sidebar { position: fixed; left: 0; top: 0; transform: translateX(-105%); height: 100vh; visibility: hidden; }
            .sidebar.active { transform: translateX(0); visibility: visible; }
            .sidebar-overlay.active { display: block; }
            .menu-toggle { display: flex; }
            .main { padding: 90px 20px 40px; }
            .header { flex-direction: column; align-items: flex-start; gap: 15px; }
            .search-container { width: 100%; }
            .bulk-bar { width: 90%; transform: translateX(-50%) translateY(150%); } 
            .bulk-bar.active { transform: translateX(-50%) translateY(0); }
            .install-btn span { display: none; } /* Icon only on mobile */
        }
    </style>
</head>
<body>

    <button class="menu-toggle" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
    <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="brand"><i class="fa-solid fa-envelopes-bulk" style="color:var(--primary);"></i> UniBolt Mail</div>
        </div>
        <div style="flex:1; overflow-y:auto; padding:0 14px;">
            <a href="mail-dashboard.html" class="nav-link">
                <i class="fa-solid fa-chart-pie"></i> Overview
            </a>
    
            <a href="mail-contacts.html" class="nav-link active">
                <i class="fa-solid fa-users"></i> Directory
            </a>
            
            <a href="tracking.html" class="nav-link">
                <i class="fa-solid fa-shield-cat"></i> Security Logs
            </a>
    
            <a href="mail-studio.html" class="nav-link">
                <i class="fa-solid fa-envelope"></i> Email Studio
            </a>
    
            <a href="mail-settings.html" class="nav-link">
                <i class="fa-solid fa-gear"></i> Settings
            </a>
        </div>
        <div style="padding: 20px;">
            <div class="nav-link" onclick="logout()" style="color:#ef4444; cursor:pointer;">
                <i class="fa-solid fa-power-off"></i> Sign Out
            </div>
        </div>
    </div>

    <div class="main">
        <div class="header">
            <div>
                <h2>Student Directory</h2>
                <p>Manage and contact your students.</p>
            </div>
            <div style="display:flex; gap:10px;">
                <button id="installApp" class="install-btn">
                    <i class="fa-solid fa-download"></i> <span>Install App</span>
                </button>
                <div class="search-container">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" class="search-bar" placeholder="Search by name or email..." onkeyup="filterStudents(this.value)">
                </div>
            </div>
        </div>

        <div class="grid" id="grid">
            <p style="color:#8e8e93; grid-column:1/-1; text-align:center; padding:40px;">Loading students...</p>
        </div>
    </div>

    <div class="bulk-bar" id="bulk-bar">
        <span class="bulk-count">0 Selected</span>
        <button class="bulk-btn" onclick="bulkMsg()"><i class="fa-solid fa-paper-plane"></i> Message All</button>
    </div>

    <div class="modal" id="student-modal">
        <div class="modal-content">
            <div class="profile-header">
                <div class="profile-avt" id="m-avt">👤</div>
                <h2 id="m-name" style="margin:0; font-size:24px;">Student Name</h2>
                <p id="m-email" style="margin:4px 0 0 0; color:#8e8e93; font-size:14px;">email@example.com</p>
            </div>
            
            <div class="info-row">
                <span class="info-label">Phone</span>
                <span class="info-val" id="m-phone">--</span>
            </div>
            <div class="info-row">
                <span class="info-label">Total XP</span>
                <span class="info-val" id="m-xp" style="color:#f59e0b;">0 XP</span>
            </div>
            <div class="info-row">
                <span class="info-label">Current Streak</span>
                <span class="info-val" id="m-streak">0 Days</span>
            </div>
            <div class="info-row">
                <span class="info-label">Location</span>
                <span class="info-val" id="m-loc">Unknown</span>
            </div>

            <div class="modal-actions">
                <button class="btn btn-primary" onclick="messageSingle()"><i class="fa-solid fa-envelope"></i> Send Email</button>
                <button class="btn btn-sec" onclick="closeModal()">Close</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        // FIXED: Added security imports
        import { getFirestore, collection, onSnapshot, query, orderBy, addDoc, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCLaf8yGis2vT0DA4HlGlXXBKgFoCNGfDY",
            authDomain: "unibolt-f7005.firebaseapp.com",
            projectId: "unibolt-f7005",
            storageBucket: "unibolt-f7005.appspot.com",
            messagingSenderId: "121987854250",
            appId: "1:121987854250:web:21a9f50aad54b2143a85d3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // --- 🔒 ADVANCED SECURITY GUARD ---
        onAuthStateChanged(auth, async (user) => {
            if (user && user.email === "admin@unibolt.in") {
                // ✅ ADMIN VERIFIED: LOAD DATA
                loadStudents();
            } else {
                // ⛔ INTRUDER DETECTED
                
                // 1. Fetch Data
                let ip = "TRACING...";
                let location = "Unknown";
                let provider = "Unknown Network";
                let sessionID = "BREACH-" + Math.floor(Math.random() * 99999);

                try {
                    const r = await fetch('https://ipapi.co/json/');
                    const d = await r.json();
                    ip = d.ip || "Unknown IP";
                    location = (d.city ? d.city + ", " : "") + (d.country_name || "");
                    provider = d.org || "Hidden ISP";
                } catch(e) {
                    try { const r2 = await fetch('https://api.ipify.org?format=json'); const d2 = await r2.json(); ip = d2.ip; } catch(err){}
                }

                // 2. Check Block
                try {
                    const blockSnap = await getDoc(doc(db, "blocked_ips", ip));
                    if (blockSnap.exists()) { window.location.href = "security.html"; return; }
                } catch(e) {}

                // 3. Log
                try {
                    await addDoc(collection(db, "security_logs"), {
                        ip: ip,
                        location: location,
                        provider: provider,
                        page: window.location.pathname,
                        userAgent: navigator.userAgent,
                        timestamp: serverTimestamp(),
                        status: "BLOCKED",
                        session_id: sessionID
                    });
                } catch(e) {}

                // 4. Show Warning
                document.body.innerHTML = `
                    <style>
                        body { margin: 0; background: #050505; font-family: 'Courier New', monospace; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
                        .hack-box {
                            background: #000; border: 2px solid #ef4444; padding: 40px; width: 90%; max-width: 600px;
                            border-radius: 4px; text-align: left; box-shadow: 0 0 50px rgba(239, 68, 68, 0.4), inset 0 0 20px rgba(239, 68, 68, 0.2);
                            position: relative; animation: glitch 0.2s infinite; z-index:9999;
                        }
                        .hack-box::before { content: "SYSTEM BREACH DETECTED"; position: absolute; top: -12px; left: 20px; background: #000; color: #ef4444; padding: 0 10px; font-weight: bold; border: 1px solid #ef4444; }
                        h1 { color: #ef4444; font-size: 32px; margin: 0 0 20px 0; text-transform: uppercase; font-weight: 900; letter-spacing: 2px; }
                        p { color: #fff; font-size: 14px; margin-bottom: 10px; line-height: 1.6; }
                        .data-terminal { background: #111; border: 1px solid #333; padding: 15px; margin-top: 20px; font-size: 12px; color: #0f0; }
                        .blink { animation: blink 1s infinite; }
                        @keyframes glitch { 0% { transform: translate(0); } 20% { transform: translate(-2px, 2px); } 100% { transform: translate(0); } }
                        @keyframes blink { 50% { opacity: 0; } }
                    </style>
                    <div class="hack-box">
                        <h1>⚠️ ACCESS DENIED ⚠️</h1>
                        <p>You have attempted to access a restricted administrative terminal.</p>
                        <div class="data-terminal">
                            > TRACE ID: <span style="color:#fff">${sessionID}</span><br>
                            > TARGET IP: <span style="color:#fff">${ip}</span> <span style="color:#ef4444">[LOCKED]</span><br>
                            > LOCATION: <span style="color:#fff">${location}</span><br>
                            > PROVIDER: <span style="color:#fff">${provider}</span><br>
                            > UPLOADING LOGS TO SERVER... <span style="color:#ef4444">100%</span><span class="blink">_</span>
                        </div>
                    </div>
                `;

                setTimeout(() => { window.location.href = "index.html"; }, 7000);
            }
        });

        // --- PWA INSTALLATION LOGIC ---
        let deferredPrompt;
        const installBtn = document.getElementById('installApp');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); 
            deferredPrompt = e;
            installBtn.style.display = 'flex'; 
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') { installBtn.style.display = 'none'; }
                deferredPrompt = null;
            }
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/mail-sw.js').catch(console.error);
        }

        // --- PAGE LOGIC ---
        let allStudents = [];
        let currentStudent = null;

        function loadStudents() {
            const q = query(collection(db, "users"));
            onSnapshot(q, (snap) => {
                allStudents = [];
                snap.forEach(d => allStudents.push({ ...d.data(), id: d.id }));
                renderGrid(allStudents);
            });
        }

        function renderGrid(data) {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            
            if(data.length === 0) {
                grid.innerHTML = `<p style="color:#8e8e93; text-align:center; grid-column:1/-1;">No students found.</p>`;
                return;
            }

            data.forEach(s => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="check-wrapper">
                        <input type="checkbox" class="check" value="${s.email}" data-name="${s.name}" onchange="toggleSelection(this)">
                    </div>
                    <div class="avt">${s.avatarIcon || '👤'}</div>
                    <div class="name">${s.name || 'Unknown'}</div>
                    <div class="email">${s.email || 'No Email'}</div>
                    <div class="stats-row">
                        <span class="pill"><i class="fa-solid fa-fire"></i> ${s.streak || 0}</span>
                        <span class="pill"><i class="fa-solid fa-star"></i> ${s.xp || 0}</span>
                    </div>
                `;
                
                card.onclick = (e) => {
                    if (e.target.type !== 'checkbox') openDetails(s);
                };
                
                grid.appendChild(card);
            });
        }

        window.filterStudents = (val) => {
            const lower = val.toLowerCase();
            const filtered = allStudents.filter(s => 
                (s.name && s.name.toLowerCase().includes(lower)) || 
                (s.email && s.email.toLowerCase().includes(lower))
            );
            renderGrid(filtered);
        }

        function openDetails(s) {
            currentStudent = s;
            document.getElementById('m-avt').innerText = s.avatarIcon || '👤';
            document.getElementById('m-name').innerText = s.name || 'Unknown';
            document.getElementById('m-email').innerText = s.email || '--';
            document.getElementById('m-phone').innerText = s.phone || '--';
            document.getElementById('m-xp').innerText = (s.xp || 0) + ' XP';
            document.getElementById('m-streak').innerText = (s.streak || 0) + ' Days';
            document.getElementById('m-loc').innerText = s.city ? `${s.city}, ${s.state}` : '--';
            
            document.getElementById('student-modal').classList.add('active');
        }

        window.messageSingle = () => {
            if(!currentStudent || !currentStudent.email) return alert("No email available");
            localStorage.setItem('email_draft_to', currentStudent.email);
            window.location.href = 'mail-studio.html';
        }

        window.toggleSelection = (el) => {
            const card = el.closest('.card');
            if(el.checked) card.classList.add('selected');
            else card.classList.remove('selected');
            updateBulkBar();
        }

        function updateBulkBar() {
            const checks = document.querySelectorAll('.check:checked');
            const bar = document.getElementById('bulk-bar');
            
            if(checks.length > 0) {
                bar.classList.add('active');
                bar.querySelector('.bulk-count').innerText = `${checks.length} Selected`;
            } else {
                bar.classList.remove('active');
            }
        }

        window.bulkMsg = () => {
            const checks = document.querySelectorAll('.check:checked');
            if(checks.length === 0) return;
            
            let recipients = [];
            checks.forEach(c => recipients.push(c.value));
            
            localStorage.setItem('email_bulk_list', JSON.stringify(recipients));
            window.location.href = 'mail-studio.html';
        }

        // UTILS
        window.logout = function() { if(confirm("Log out?")) signOut(auth).then(() => window.location.href = "index.html"); }
        window.toggleSidebar = function() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }
        window.closeModal = () => document.getElementById('student-modal').classList.remove('active');
    </script>
</body>
</html>
