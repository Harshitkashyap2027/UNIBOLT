<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniBolt - Admin Access</title>
    <link rel="icon" type="image/png" href="UniBolt.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #050505; margin: 0;
            display: flex; align-items: center; justify-content: center;
            height: 100vh; font-family: monospace;
        }
        .admin-card {
            width: 90%; max-width: 400px; padding: 40px; background: #09090b;
            border: 1px solid #333; border-radius: 12px;
            box-shadow: 0 0 40px rgba(239, 68, 68, 0.1);
            text-align: center; position: relative; overflow: hidden;
        }
        .admin-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background: #ef4444; box-shadow: 0 0 10px #ef4444;
        }
        .logo-icon { font-size: 40px; color: #ef4444; margin-bottom: 20px; }
        h1 { color: #fff; font-size: 24px; margin-bottom: 5px; font-family: sans-serif; font-weight: 800; }
        p { color: #666; font-size: 12px; margin-bottom: 30px; letter-spacing: 1px; text-transform: uppercase; }

        .input-group { margin-bottom: 20px; text-align: left; }
        label { color: #888; font-size: 11px; text-transform: uppercase; margin-bottom: 5px; display: block; }
        input {
            width: 100%; padding: 12px; background: #111; border: 1px solid #333;
            color: white; border-radius: 6px; outline: none; font-family: monospace; box-sizing: border-box;
        }
        input:focus { border-color: #ef4444; }

        .btn-admin {
            width: 100%; padding: 12px; background: #ef4444; color: white; border: none;
            border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-admin:hover { background: #dc2626; box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); }

        #error-msg { color: #ef4444; font-size: 12px; margin-top: 15px; display: none; }
        #success-msg { color: #10b981; font-size: 12px; margin-top: 15px; display: none; }
    </style>
</head>
<body>

    <div class="admin-card">
        <i class="fa-solid fa-shield-cat logo-icon"></i>
        <h1>Admin Control</h1>
        <p>Restricted Access Area</p>

        <form id="admin-login-form">
            <div class="input-group">
                <label>Admin ID</label>
                <input type="email" id="adm-email" value="admin@unibolt.in" readonly style="color:#666; cursor:not-allowed;">
            </div>
            
            <div class="input-group">
                <label>Passcode</label>
                <input type="password" id="adm-pass" placeholder="Enter Password" required>
            </div>

            <button type="submit" class="btn-admin" id="login-btn">Secure Login</button>
            <div id="error-msg"></div>
            <div id="success-msg"></div>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCLaf8yGis2vT0DA4HlGlXXBKgFoCNGfDY",
            authDomain: "unibolt-f7005.firebaseapp.com",
            projectId: "unibolt-f7005",
            storageBucket: "unibolt-f7005.appspot.com",
            messagingSenderId: "121987854250",
            appId: "1:121987854250:web:21a9f50aad54b2143a85d3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const loginForm = document.getElementById('admin-login-form');
        const errorMsg = document.getElementById('error-msg');
        const successMsg = document.getElementById('success-msg');
        const btn = document.getElementById('login-btn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            btn.innerText = "Processing...";
            btn.disabled = true;
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            const email = document.getElementById('adm-email').value;
            const password = document.getElementById('adm-pass').value;

            try {
                // 1. Try to Login
                await signInWithEmailAndPassword(auth, email, password);
                
                // Login Success
                successMsg.innerHTML = '<i class="fa-solid fa-check"></i> Access Granted. Redirecting...';
                successMsg.style.display = 'block';
                setTimeout(() => { window.location.href = "admin-exam.html"; }, 1500);

            } catch (error) {
                console.log("Login Error:", error.code);

                // 2. If User Doesn't Exist -> Create It (First Time Setup)
                if (error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential') {
                    
                    // Attempt to create user since it might be first run
                    try {
                        await createUserWithEmailAndPassword(auth, email, password);
                        successMsg.innerHTML = '<i class="fa-solid fa-user-plus"></i> First time setup complete. Logging in...';
                        successMsg.style.display = 'block';
                        setTimeout(() => { window.location.href = "admin-exam.html"; }, 1500);
                    } catch (createErr) {
                        // If create fails (e.g. wrong password for existing user)
                        errorMsg.innerHTML = '<i class="fa-solid fa-xmark"></i> Incorrect Password';
                        errorMsg.style.display = 'block';
                        btn.innerText = "Secure Login";
                        btn.disabled = false;
                    }

                } else {
                    errorMsg.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> Error: ${error.code}`;
                    errorMsg.style.display = 'block';
                    btn.innerText = "Secure Login";
                    btn.disabled = false;
                }
            }
        });
    </script>
</body>
</html>
