<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniBolt - Admin Access</title>
    <link rel="icon" type="image/png" href="UniBolt.png">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #050505;
            display: flex; align-items: center; justify-content: center;
            height: 100vh; font-family: monospace;
        }
        .admin-card {
            width: 400px; padding: 40px; background: #09090b;
            border: 1px solid #333; border-radius: 12px;
            box-shadow: 0 0 40px rgba(239, 68, 68, 0.1);
            text-align: center; position: relative; overflow: hidden;
        }
        /* Red Top Bar */
        .admin-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background: #ef4444; box-shadow: 0 0 10px #ef4444;
        }
        
        .logo-icon { font-size: 40px; color: #ef4444; margin-bottom: 20px; }
        h1 { color: #fff; font-size: 24px; margin-bottom: 5px; font-family: sans-serif; font-weight: 800; }
        p { color: #666; font-size: 12px; margin-bottom: 30px; letter-spacing: 1px; text-transform: uppercase; }

        .input-group { margin-bottom: 20px; text-align: left; }
        label { color: #888; font-size: 11px; text-transform: uppercase; margin-bottom: 5px; display: block; }
        input {
            width: 100%; padding: 12px; background: #111; border: 1px solid #333;
            color: #ef4444; border-radius: 6px; outline: none; font-family: monospace;
        }
        input:focus { border-color: #ef4444; }

        .btn-admin {
            width: 100%; padding: 12px; background: #ef4444; color: white; border: none;
            border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-admin:hover { background: #dc2626; box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); }

        #error-msg { color: #ef4444; font-size: 12px; margin-top: 15px; display: none; }
    </style>
</head>
<body>

    <div class="admin-card">
        <i class="fa-solid fa-shield-cat logo-icon"></i>
        <h1>Admin Control</h1>
        <p>Restricted Access Area</p>

        <form id="admin-login-form">
            <div class="input-group">
                <label>Admin ID</label>
                <input type="email" id="adm-email" placeholder="root@unibolt.in" required>
            </div>
            
            <div class="input-group">
                <label>Passcode</label>
                <input type="password" id="adm-pass" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-admin" id="login-btn">Authenticate</button>
            <div id="error-msg"><i class="fa-solid fa-triangle-exclamation"></i> Access Denied</div>
        </form>
        
        <div style="margin-top: 20px; font-size: 10px; color: #444;">
            Session ID: <span style="color: #666;">8473-X9</span>
        </div>
    </div>

    <!-- IP Lockout check runs FIRST, before Firebase loads -->
    <script>
        (function() {
            const LOCKOUT_KEY = 'admin_login_lockout';
            const ATTEMPT_KEY = 'admin_login_attempts';
            const MAX_ATTEMPTS = 5;
            const LOCKOUT_DURATION_MS = 30 * 60 * 1000;

            const lockoutUntil = parseInt(localStorage.getItem(LOCKOUT_KEY) || '0');
            if (Date.now() < lockoutUntil) {
                const remaining = Math.ceil((lockoutUntil - Date.now()) / 60000);
                document.addEventListener('DOMContentLoaded', function() {
                    const card = document.querySelector('.admin-card');
                    if (card) {
                        card.innerHTML = `
                            <div style="font-size:40px; color:#ef4444; margin-bottom:20px;">🔒</div>
                            <h1 style="color:#ef4444;">Access Locked</h1>
                            <p style="color:#888; margin-bottom:20px; font-size:13px; line-height:1.5;">
                                Too many failed login attempts.<br>
                                This device has been temporarily blocked.
                            </p>
                            <div style="background:#111; border:1px solid #ef4444; padding:15px; border-radius:8px; font-size:12px; color:#ef4444; margin-bottom:20px;">
                                <div style="color:#fff; margin-bottom:5px;">⏱ Lockout expires in: <span id="lockout-timer" style="font-weight:bold; color:#ef4444;">${remaining} min</span></div>
                                <div>Max attempts (${MAX_ATTEMPTS}) exceeded.</div>
                            </div>
                            <div style="font-size:10px; color:#444; margin-top:15px;">If this is an error, contact the system administrator.</div>
                        `;
                    }
                    const interval = setInterval(function() {
                        const lu = parseInt(localStorage.getItem(LOCKOUT_KEY) || '0');
                        const rem = lu - Date.now();
                        if (rem <= 0) {
                            clearInterval(interval);
                            localStorage.removeItem(LOCKOUT_KEY);
                            localStorage.removeItem(ATTEMPT_KEY);
                            location.reload();
                        } else {
                            const t = document.getElementById('lockout-timer');
                            if (t) t.textContent = Math.ceil(rem / 60000) + ' min';
                        }
                    }, 10000);
                });
            }
        })();
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCLaf8yGis2vT0DA4HlGlXXBKgFoCNGfDY",
            authDomain: "unibolt-f7005.firebaseapp.com",
            projectId: "unibolt-f7005",
            storageBucket: "unibolt-f7005.appspot.com",
            messagingSenderId: "121987854250",
            appId: "1:121987854250:web:21a9f50aad54b2143a85d3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- IP LOCKOUT CONSTANTS ---
        const MAX_ATTEMPTS = 5;
        const LOCKOUT_DURATION_MS = 30 * 60 * 1000; // 30 minutes
        const ATTEMPT_KEY = 'admin_login_attempts';
        const LOCKOUT_KEY = 'admin_login_lockout';

        // --- CHECK LOCKOUT ON PAGE LOAD ---
        function checkLockout() {
            const lockoutUntil = parseInt(localStorage.getItem(LOCKOUT_KEY) || '0');
            if (Date.now() < lockoutUntil) {
                const remaining = Math.ceil((lockoutUntil - Date.now()) / 60000);
                showLockoutScreen(remaining);
                return true;
            }
            return false;
        }

        function showLockoutScreen(minutesLeft) {
            document.querySelector('.admin-card').innerHTML = `
                <div style="font-size:40px; color:#ef4444; margin-bottom:20px;">🔒</div>
                <h1 style="color:#ef4444;">Access Locked</h1>
                <p style="color:#888; margin-bottom:20px; font-size:13px; line-height:1.5;">
                    Too many failed login attempts.<br>
                    This device has been temporarily blocked.
                </p>
                <div style="background:#111; border:1px solid #ef4444; padding:15px; border-radius:8px; font-size:12px; color:#ef4444; margin-bottom:20px;">
                    <div style="color:#fff; margin-bottom:5px;">⏱ Lockout expires in: <span id="lockout-timer" style="font-weight:bold; color:#ef4444;">${minutesLeft} min</span></div>
                    <div>Max attempts (${MAX_ATTEMPTS}) exceeded.</div>
                </div>
                <div style="font-size:10px; color:#444; margin-top:15px;">If this is an error, contact the system administrator.</div>
            `;
            // Live countdown
            const interval = setInterval(() => {
                const lockoutUntil = parseInt(localStorage.getItem(LOCKOUT_KEY) || '0');
                const remaining = lockoutUntil - Date.now();
                if (remaining <= 0) {
                    clearInterval(interval);
                    localStorage.removeItem(LOCKOUT_KEY);
                    localStorage.removeItem(ATTEMPT_KEY);
                    location.reload();
                } else {
                    const timerEl = document.getElementById('lockout-timer');
                    if (timerEl) timerEl.textContent = Math.ceil(remaining / 60000) + ' min';
                }
            }, 10000);
        }

        function recordFailedAttempt() {
            const now = Date.now();
            let attempts = JSON.parse(localStorage.getItem(ATTEMPT_KEY) || '[]');
            // Remove attempts older than the lockout window
            attempts = attempts.filter(t => now - t < LOCKOUT_DURATION_MS);
            attempts.push(now);
            localStorage.setItem(ATTEMPT_KEY, JSON.stringify(attempts));

            if (attempts.length >= MAX_ATTEMPTS) {
                const lockoutUntil = now + LOCKOUT_DURATION_MS;
                localStorage.setItem(LOCKOUT_KEY, lockoutUntil.toString());
                // Log to Firestore
                try {
                    setDoc(doc(db, "admin_lockouts", "latest"), {
                        lockedAt: serverTimestamp(),
                        attempts: attempts.length,
                        userAgent: navigator.userAgent
                    });
                } catch(e) {}
                showLockoutScreen(30);
            }
            return attempts.length;
        }

        // Run lockout check immediately
        if (!checkLockout()) {
            const loginForm = document.getElementById('admin-login-form');
            const errorMsg = document.getElementById('error-msg');
            const btn = document.getElementById('login-btn');

            // Show remaining attempts if any
            const existingAttempts = JSON.parse(localStorage.getItem(ATTEMPT_KEY) || '[]');
            const validAttempts = existingAttempts.filter(t => Date.now() - t < LOCKOUT_DURATION_MS);
            if (validAttempts.length > 0) {
                const remaining = MAX_ATTEMPTS - validAttempts.length;
                errorMsg.innerHTML = `<i class="fa-solid fa-shield-halved"></i> ${remaining} attempt(s) remaining before lockout`;
                errorMsg.style.display = 'block';
            }

            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                if (checkLockout()) return;

                btn.innerText = "Verifying...";
                btn.disabled = true;
                errorMsg.style.display = 'none';

                const email = document.getElementById('adm-email').value;
                const password = document.getElementById('adm-pass').value;

                // ⛔ STRICT SECURITY CHECK: ONLY ADMIN@UNIBOLT.IN ALLOWED
                if (email !== "admin@unibolt.in") {
                    const used = recordFailedAttempt();
                    const rem = MAX_ATTEMPTS - used;
                    if (rem > 0) {
                        errorMsg.innerHTML = `<i class="fa-solid fa-ban"></i> UNAUTHORIZED ID — ${rem} attempt(s) left`;
                        errorMsg.style.display = 'block';
                    }
                    btn.innerText = "Authenticate";
                    btn.disabled = false;
                    return;
                }

                try {
                    await signInWithEmailAndPassword(auth, email, password);
                    // Clear attempts on success
                    localStorage.removeItem(ATTEMPT_KEY);
                    localStorage.removeItem(LOCKOUT_KEY);
                    window.location.href = "admin.html";
                } catch (error) {
                    const used = recordFailedAttempt();
                    const rem = MAX_ATTEMPTS - used;
                    if (rem > 0) {
                        errorMsg.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> Invalid Passcode — ${rem} attempt(s) left`;
                    } else {
                        errorMsg.innerHTML = `<i class="fa-solid fa-lock"></i> Device Locked`;
                    }
                    errorMsg.style.display = 'block';
                    btn.innerText = "Authenticate";
                    btn.disabled = false;
                }
            });
        }
    </script>
</body>
</html>
