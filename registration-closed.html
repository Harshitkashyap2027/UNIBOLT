<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cohort Full | UniBolt</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1; /* Indigo/Purple */
            --accent: #10b981; /* Green */
            --bg-dark: #000000;
            --card-bg: rgba(20, 20, 25, 0.6);
            --text-main: #ffffff;
            --text-muted: #9ca3af;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            font-family: 'Inter', system-ui, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Grid Background */
        .bg-grid {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
            z-index: 0;
            animation: moveGrid 20s linear infinite;
        }

        .container {
            position: relative;
            z-index: 10;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 50px;
            border-radius: 24px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 80px rgba(99, 102, 241, 0.15);
            overflow: hidden;
        }

        /* Top Glow Line */
        .container::before {
            content: '';
            position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
        }

        .badge {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-block;
            margin-bottom: 25px;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.2);
        }

        h1 {
            margin: 0;
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(to bottom right, #fff, #a5a6f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        p {
            color: var(--text-muted);
            font-size: 15px;
            line-height: 1.6;
            margin: 15px 0 30px;
        }

        /* Progress Bar for "Full" Effect */
        .capacity-box {
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .capacity-header {
            display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 8px; color: #ccc;
        }
        .progress-track {
            height: 6px; background: #333; border-radius: 10px; overflow: hidden;
        }
        .progress-fill {
            height: 100%; width: 100%; background: #ef4444;
            box-shadow: 0 0 10px #ef4444;
            transition: width 1s ease-in-out;
        }

        /* Email Input Group */
        .input-group {
            position: relative;
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 14px 16px;
            border-radius: 10px;
            color: white;
            font-family: inherit;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--primary); }

        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 24px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }
        .btn-primary:hover {
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
            transform: translateY(-1px);
        }

        .secondary-actions {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .link-btn {
            color: var(--text-muted);
            font-size: 13px;
            text-decoration: none;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .link-btn:hover { color: white; }

        @keyframes moveGrid {
            0% { transform: translateY(0); }
            100% { transform: translateY(50px); }
        }
    </style>
</head>
<body>

    <div class="bg-grid"></div>

    <div class="container">
        <div class="badge">● Enrollment Closed</div>

        <h1>Limit Reached</h1>
        <p>
            The current cohort for UniBolt Internship is at maximum capacity. 
            We restrict intake to ensure high-quality mentorship for every student.
        </p>

        <div class="capacity-box">
            <div class="capacity-header">
                <span id="batch-label">Batch 04 Status</span>
                <span id="capacity-text" style="color: #ef4444; font-weight: bold;">100% Full</span>
            </div>
            <div class="progress-track">
                <div id="progress-bar" class="progress-fill"></div>
            </div>
            <div id="count-info" style="font-size: 11px; color: #666; margin-top: 8px; text-align: left;">
                <i class="fa-solid fa-user-group"></i> &nbsp; 500+ Students joined this week
            </div>
        </div>

        <div style="text-align: left; font-size: 13px; margin-bottom: 8px; color: #ccc;">
            Get notified when spots open:
        </div>
        <div class="input-group">
            <input type="email" id="waitlist-email" placeholder="Enter your email address...">
            <button class="btn-primary" onclick="joinWaitlist()" id="join-btn">
                Notify Me
            </button>
        </div>

        <div class="secondary-actions">
            <a href="index.html" class="link-btn">
                <i class="fa-solid fa-arrow-left"></i> Home
            </a>
            <a href="#" onclick="contactAdmin()" class="link-btn" style="color: var(--accent);">
                <i class="fa-brands fa-whatsapp"></i> Have an invite code?
            </a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        // Added getDoc and doc to imports
        import { getFirestore, collection, addDoc, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCLaf8yGis2vT0DA4HlGlXXBKgFoCNGfDY",
            authDomain: "unibolt-f7005.firebaseapp.com",
            projectId: "unibolt-f7005",
            storageBucket: "unibolt-f7005.appspot.com",
            messagingSenderId: "121987854250",
            appId: "1:121987854250:web:21a9f50aad54b2143a85d3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- 1. LOAD ADMIN CONFIG ---
        async function loadBatchInfo() {
            try {
                // Fetch from the same document we saved to in Admin Panel
                const docRef = doc(db, "platform_settings", "reg_page_config");
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    
                    // Update Elements
                    const batchName = data.batchName || "Batch 04 Status";
                    const current = data.currentCount || 490;
                    const max = data.maxCapacity || 500;
                    
                    // Math
                    const percentage = Math.min(100, Math.floor((current / max) * 100));

                    // DOM Updates
                    document.getElementById('batch-label').innerText = batchName;
                    document.getElementById('capacity-text').innerText = `${percentage}% Full`;
                    document.getElementById('progress-bar').style.width = `${percentage}%`;
                    document.getElementById('count-info').innerHTML = 
                        `<i class="fa-solid fa-user-group"></i> &nbsp; ${current}+ Students joined this week`;
                }
            } catch (error) {
                console.log("Config load error, using default static values.");
            }
        }

        // --- 2. JOIN WAITLIST LOGIC ---
        window.joinWaitlist = async () => {
            const emailInput = document.getElementById('waitlist-email');
            const btn = document.getElementById('join-btn');
            const email = emailInput.value;

            if (!email.includes('@')) {
                alert("Please enter a valid email.");
                return;
            }

            btn.innerText = "Adding...";
            btn.style.opacity = "0.7";

            try {
                await addDoc(collection(db, "waitlist"), {
                    email: email,
                    date: serverTimestamp(),
                    source: "registration_closed_page"
                });

                // Success State
                btn.style.background = "#10b981"; // Green
                btn.innerHTML = '<i class="fa-solid fa-check"></i> Added';
                emailInput.value = "";
                emailInput.placeholder = "We'll text you soon!";
                
                setTimeout(() => {
                    btn.innerText = "Notify Me";
                    btn.style.background = "#6366f1"; // Reset Color
                    btn.style.opacity = "1";
                }, 3000);

            } catch (error) {
                console.error("Error:", error);
                btn.innerText = "Error";
            }
        };

        // --- 3. WHATSAPP LOGIC ---
        window.contactAdmin = () => {
            const msg = "Hello Admin, Registration is closed but I have an Invite Code. Can I join?";
            window.open(`https://wa.me/919258837596?text=${encodeURIComponent(msg)}`, '_blank');
        };

        // Initialize Data Load
        loadBatchInfo();
    </script>
</body>
</html>
