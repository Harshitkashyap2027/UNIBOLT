<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UniBolt Security Center</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --bg: #09090b; --surface: #121212; --border: #27272a; --primary: #ef4444; --text: #e4e4e7; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR */
        .sidebar { width: 280px; background: #000; border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 100; transition: 0.3s; }
        .sidebar-header { padding: 30px 24px; font-weight: 800; font-size: 20px; color:white; display:flex; gap:10px; align-items:center; }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 14px 24px; color: #a1a1aa; text-decoration: none; font-weight: 600; transition: 0.2s; border-left: 3px solid transparent; }
        .nav-link:hover { color: white; background: rgba(255,255,255,0.03); }
        .nav-link.active { color: var(--primary); background: rgba(239, 68, 68, 0.08); border-left: 3px solid var(--primary); }

        /* MAIN AREA */
        .main { flex: 1; padding: 30px; overflow-y: auto; position: relative; }
        .header { margin-bottom: 30px; }
        .header h2 { font-size: 28px; margin: 0; color: white; }
        .header p { color: #a1a1aa; margin: 5px 0 0; }

        /* BENTO GRID */
        .bento-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }

        /* IP CARD */
        .ip-card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
            padding: 24px; position: relative; transition: 0.2s; cursor: pointer;
            display: flex; flex-direction: column; gap: 12px; overflow: hidden;
        }
        .ip-card:hover { border-color: #444; transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* High Alert Style */
        .ip-card.alert { border-color: rgba(239, 68, 68, 0.5); box-shadow: 0 0 20px rgba(239, 68, 68, 0.1); }
        
        .alert-badge { 
            align-self: flex-start; /* Fix overlap */
            background: rgba(239, 68, 68, 0.15); color: var(--primary); 
            font-size: 10px; font-weight: 800; padding: 6px 10px; border-radius: 6px; 
            text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px;
            display: inline-flex; align-items: center; gap: 5px;
        }

        .ip-header { display: flex; align-items: center; gap: 12px; }
        .flag-icon { width: 44px; height: 44px; background: #222; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; color: #888; }
        
        .ip-address { font-size: 18px; font-weight: 700; color: white; font-family: monospace; }
        .location { font-size: 12px; color: #888; margin-top: 2px; }

        .stats-row { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; padding-top: 15px; border-top: 1px solid #222; }
        .count-badge { font-size: 12px; color: #fff; background: #333; padding: 6px 12px; border-radius: 20px; font-weight: 600; }
        
        /* BLOCK SWITCH */
        .block-switch { display: flex; align-items: center; gap: 10px; cursor: pointer; z-index: 2; }
        .switch-label { font-size: 11px; font-weight: 700; color: #666; transition: 0.2s; text-transform: uppercase; }
        .toggle { width: 44px; height: 24px; background: #333; border-radius: 20px; position: relative; transition: 0.3s; }
        .toggle::after { content:''; position: absolute; top: 3px; left: 3px; width: 18px; height: 18px; background: white; border-radius: 50%; transition: 0.3s; }
        
        /* Blocked State */
        .blocked .toggle { background: var(--primary); }
        .blocked .toggle::after { transform: translateX(20px); }
        .blocked .switch-label { color: var(--primary); }

        /* MODAL */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            z-index: 1000; display: none; align-items: center; justify-content: center; opacity: 0; transition: 0.3s;
        }
        .modal-overlay.active { display: flex; opacity: 1; }
        
        .modal-content {
            background: #09090b; width: 90%; max-width: 600px; max-height: 80vh;
            border: 1px solid #333; border-radius: 20px; overflow: hidden; display: flex; flex-direction: column;
            transform: scale(0.95); transition: 0.3s; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .modal-overlay.active .modal-content { transform: scale(1); }

        .modal-header { padding: 20px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; background: #111; }
        .modal-title h3 { margin: 0; color: white; font-size: 18px; }
        .modal-title p { margin: 5px 0 0; color: #888; font-size: 12px; font-family: monospace; }
        .close-btn { background: none; border: none; color: #666; font-size: 20px; cursor: pointer; }
        .close-btn:hover { color: white; }

        .modal-body { padding: 0; overflow-y: auto; }
        
        .log-item { display: flex; gap: 15px; padding: 15px 20px; border-bottom: 1px solid #222; }
        .log-item:last-child { border-bottom: none; }
        .log-time { font-size: 11px; color: #666; min-width: 60px; font-family: monospace; text-align: right; }
        .log-details h4 { margin: 0 0 4px; color: #e4e4e7; font-size: 13px; font-weight: 600; }
        .log-details p { margin: 0; color: #888; font-size: 11px; }
        .log-meta { display: flex; gap: 10px; margin-top: 5px; }
        .tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: #222; color: #aaa; border: 1px solid #333; }

        /* MOBILE */
        .menu-toggle { display: none; position: fixed; top: 20px; right: 20px; z-index: 1200; background: var(--surface); border: 1px solid var(--border); color: white; width: 44px; height: 44px; border-radius: 12px; cursor: pointer; align-items: center; justify-content: center; }
        .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 90; }

        @media (max-width: 900px) {
            .sidebar { position: fixed; transform: translateX(-105%); height: 100vh; }
            .sidebar.active { transform: translateX(0); }
            .sidebar-overlay.active { display: block; }
            .menu-toggle { display: flex; }
            .main { padding: 80px 20px 20px; }
            .bento-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <button class="menu-toggle" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
    <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header"><i class="fa-solid fa-shield-cat" style="color:var(--primary);"></i> Security Center</div>
        <div style="flex:1; padding:0 14px;">
            <a href="admin-dashboard.html" class="nav-link"><i class="fa-solid fa-chart-pie"></i> Overview</a>
            <a href="students.html" class="nav-link"><i class="fa-solid fa-users"></i> Directory</a>
            <a href="#" class="nav-link active"><i class="fa-solid fa-eye"></i> Live Tracking</a>
            <a href="mail-settings.html" class="nav-link"><i class="fa-solid fa-gear"></i> Settings</a>
        </div>
        <div style="padding: 20px;"><div class="nav-link" onclick="logout()" style="color:#ef4444; cursor:pointer;"><i class="fa-solid fa-power-off"></i> Sign Out</div></div>
    </div>

    <div class="main">
        <div class="header">
            <h2>Threat Monitor</h2>
            <p>Real-time intrusion detection and automatic blocking.</p>
        </div>

        <div class="bento-grid" id="tracking-grid">
            <p style="color:#666;">Initializing scanner...</p>
        </div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">
                    <h3>Incident Report</h3>
                    <p id="modal-ip">IP: 0.0.0.0</p>
                </div>
                <button class="close-btn" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body" id="modal-logs">
                </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, limit, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCLaf8yGis2vT0DA4HlGlXXBKgFoCNGfDY",
            authDomain: "unibolt-f7005.firebaseapp.com",
            projectId: "unibolt-f7005",
            storageBucket: "unibolt-f7005.appspot.com",
            messagingSenderId: "121987854250",
            appId: "1:121987854250:web:21a9f50aad54b2143a85d3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // 1. DATA STATE
        let blockedIPs = new Set();
        let allLogs = []; // Raw logs
        let groupedData = {}; // Grouped by IP

        // 2. LISTENERS
        onSnapshot(collection(db, "blocked_ips"), (snap) => {
            blockedIPs.clear();
            snap.forEach(d => blockedIPs.add(d.id));
            renderGrid();
        });

        const q = query(collection(db, "security_logs"), orderBy("timestamp", "desc"), limit(200));
        onSnapshot(q, (snap) => {
            allLogs = [];
            snap.forEach(d => allLogs.push(d.data()));
            processData();
        });

        // 3. LOGIC: Process and Auto-Block
        function processData() {
            groupedData = {};
            
            allLogs.forEach(log => {
                if (!log.ip) return;
                
                if (!groupedData[log.ip]) {
                    groupedData[log.ip] = {
                        ip: log.ip,
                        location: log.location || "Unknown",
                        provider: log.provider || "Unknown ISP",
                        attempts: 0,
                        logs: []
                    };
                }
                groupedData[log.ip].attempts++;
                groupedData[log.ip].logs.push(log);
            });

            // AUTO BLOCK CHECK
            Object.values(groupedData).forEach(async (data) => {
                if (data.attempts >= 3 && !blockedIPs.has(data.ip)) {
                    console.log(`Auto-blocking high threat: ${data.ip}`);
                    await toggleBlock(data.ip, true); // True = Silent/Force block
                }
            });

            renderGrid();
        }

        // 4. RENDER GRID
        function renderGrid() {
            const grid = document.getElementById('tracking-grid');
            if (Object.keys(groupedData).length === 0) {
                grid.innerHTML = '<p style="color:#666;">No threats detected recently.</p>';
                return;
            }

            grid.innerHTML = "";

            Object.values(groupedData).forEach(data => {
                const isBlocked = blockedIPs.has(data.ip);
                const isHighRisk = data.attempts >= 3;
                const riskClass = isHighRisk ? 'alert' : '';
                const blockClass = isBlocked ? 'blocked' : '';
                const statusText = isBlocked ? 'LOCKED' : 'ACTIVE';

                const card = document.createElement('div');
                card.className = `ip-card ${riskClass}`;
                card.innerHTML = `
                    ${isHighRisk ? '<div class="alert-badge"><i class="fa-solid fa-triangle-exclamation"></i> HIGH THREAT</div>' : ''}
                    
                    <div class="ip-header">
                        <div class="flag-icon"><i class="fa-solid fa-globe"></i></div>
                        <div>
                            <div class="ip-address">${data.ip}</div>
                            <div class="location">${data.location}</div>
                        </div>
                    </div>

                    <div style="font-size:12px; color:#666;">ISP: ${data.provider}</div>

                    <div class="stats-row">
                        <div class="count-badge">${data.attempts} Attempts</div>
                        
                        <div class="block-switch ${blockClass}" id="btn-${data.ip.replace(/\./g,'-')}">
                            <span class="switch-label">${statusText}</span>
                            <div class="toggle"></div>
                        </div>
                    </div>
                `;

                // Add Click Event for Modal (Background Click)
                card.addEventListener('click', (e) => {
                    // Don't open modal if they clicked the Switch
                    if(e.target.closest('.block-switch')) return;
                    openDossier(data.ip);
                });

                // Add Click Event for Switch
                const switchBtn = card.querySelector('.block-switch');
                switchBtn.addEventListener('click', (e) => {
                    e.stopPropagation(); // Stop bubble
                    toggleBlock(data.ip);
                });

                grid.appendChild(card);
            });
        }

        // 5. MODAL LOGIC
        window.openDossier = (ip) => {
            const data = groupedData[ip];
            if(!data) return;

            document.getElementById('modal-ip').innerText = `Target: ${ip} | ${data.location}`;
            const body = document.getElementById('modal-logs');
            body.innerHTML = "";

            data.logs.forEach(log => {
                let timeStr = "Just now";
                if(log.timestamp) timeStr = log.timestamp.toDate().toLocaleString();

                body.innerHTML += `
                    <div class="log-item">
                        <div class="log-time">${timeStr.split(',')[1]}<br><span style="opacity:0.5">${timeStr.split(',')[0]}</span></div>
                        <div class="log-details">
                            <h4>Target: ${log.page}</h4>
                            <div class="log-meta">
                                <span class="tag">${log.status}</span>
                                <span class="tag" style="max-width:150px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis;">${log.userAgent}</span>
                            </div>
                        </div>
                    </div>
                `;
            });

            document.getElementById('modal').classList.add('active');
        };

        window.closeModal = () => document.getElementById('modal').classList.remove('active');

        // 6. BLOCKING LOGIC
        window.toggleBlock = async (ip, silent = false) => {
            const ref = doc(db, "blocked_ips", ip);
            
            if(blockedIPs.has(ip)) {
                // UNBLOCK
                if(!silent && confirm(`Unblock ${ip}?`)) {
                    await deleteDoc(ref);
                }
            } else {
                // BLOCK
                if(silent || confirm(`Confirm Block on ${ip}?`)) {
                    await setDoc(ref, { 
                        blockedAt: new Date(),
                        reason: silent ? "Auto-Block (3+ Attempts)" : "Manual Admin Block"
                    });
                }
            }
        };

        // UTILS
        window.toggleSidebar = () => {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }
        window.logout = () => { if(confirm("Log out?")) signOut(auth).then(() => window.location.href = "mail-login.html"); }
    </script>
</body>
</html>
