<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>UniBolt - Curriculum</title>
    <link rel="icon" type="image/png" href="UniBolt.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyCLaf8yGis2vT0DA4HlGlXXBKgFoCNGfDY",
            authDomain: "unibolt-f7005.firebaseapp.com",
            projectId: "unibolt-f7005",
            storageBucket: "unibolt-f7005.appspot.com",
            messagingSenderId: "121987854250",
            appId: "1:121987854250:web:21a9f50aad54b2143a85d3"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        
        onAuthStateChanged(auth, (user) => {
            if (!user) console.log("User not logged in");
        });
    </script>

    <style>
        /* --- 3D THEME --- */
        :root {
            --bg-deep: #0f0e13;
            --card-surface: #1a1920;
            --accent-primary: #8b5cf6;
            --accent-secondary: #ec4899;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --sidebar-width: 250px;
        }

        body {
            background-color: var(--bg-deep);
            font-family: 'Inter', sans-serif;
            margin: 0;
            color: var(--text-main);
            overflow-x: hidden;
            background-image: radial-gradient(#2d2b3b 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .app-container { display: flex; min-height: 100vh; }
        .main-content { flex: 1; margin-left: var(--sidebar-width); padding: 30px; max-width: 1200px; }
        .page-body { margin-top: 10px; }

        /* SIDEBAR (Fixed Z-Index) */
        .sidebar {
            width: var(--sidebar-width); 
            height: 100vh; 
            position: fixed; 
            left: 0; top: 0;
            background: #111014; 
            border-right: 1px solid rgba(255,255,255,0.05);
            padding: 25px 15px; 
            box-sizing: border-box; 
            display: flex; 
            flex-direction: column; /* Stacks items vertically */
            z-index: 20000;
        }

        .brand { 
            font-size: 20px; font-weight: 800; color: white; margin-bottom: 30px; 
            padding-left: 10px; text-shadow: 0 0 15px rgba(139, 92, 246, 0.4); 
        }

        /* Nav Menu fills the space */
        .nav-menu {
            display: flex; flex-direction: column; gap: 4px;
            flex: 1; /* This pushes the footer down */
        }

        .nav-item {
            display: flex; align-items: center; gap: 12px; padding: 10px 14px;
            color: var(--text-muted); text-decoration: none; border-radius: 10px;
            margin-bottom: 4px; font-weight: 500; font-size: 14px; transition: 0.2s;
        }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-item.active { 
            background: linear-gradient(90deg, rgba(139, 92, 246, 0.15), transparent); 
            color: var(--accent-primary); border-left: 3px solid var(--accent-primary); 
        }

        /* FOOTER with VISIBLE LINE */
        .sidebar-footer { 
            margin-top: auto; 
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1); /* The line you wanted */
        }

        /* HEADER */
        .top-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; display: none; }
        .mobile-menu-toggle { display: none; }

        /* SEARCH BAR */
        .search-bar {
            background: rgba(26, 25, 32, 0.8); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1); padding: 15px 20px;
            border-radius: 16px; display: flex; align-items: center; gap: 15px;
            margin-bottom: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .search-input { background: transparent; border: none; color: white; font-size: 15px; flex: 1; outline: none; font-family: 'Inter', sans-serif; }
        #filter-select { background: #111; color: #ccc; border: 1px solid rgba(255,255,255,0.1); padding: 8px 12px; border-radius: 8px; outline: none; font-size: 13px; }

        /* GRID */
        .dataset-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding-bottom: 40px; }
        .data-card {
            background: linear-gradient(145deg, #1f1e26, #151419); border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05); padding: 24px;
            position: relative; overflow: hidden; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255,255,255,0.08); 
        }
        .data-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255,255,255,0.15);
            z-index: 10; border-color: rgba(139, 92, 246, 0.3);
        }
        .data-card h3 { margin: 0 0 10px 0; font-size: 18px; font-weight: 600; color: white; }
        .data-card p { margin: 0 0 20px 0; font-size: 13px; color: var(--text-muted); line-height: 1.5; }

        .tag { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
        .tag-cv { background: rgba(139, 92, 246, 0.15); color: #8b5cf6; border: 1px solid rgba(139, 92, 246, 0.3); }
        .tag-nlp { background: rgba(16, 185, 129, 0.15); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); }
        .tag-tab { background: rgba(59, 130, 246, 0.15); color: #3b82f6; border: 1px solid rgba(59, 130, 246, 0.3); }

        .meta-row { display: flex; gap: 15px; color: #666; font-size: 12px; margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px; }
        .meta-item { display: flex; align-items: center; gap: 6px; }

        .btn-primary {
            background: linear-gradient(to bottom, #8b5cf6, #7c3aed); color: white; border: none;
            padding: 10px 16px; border-radius: 12px; font-weight: 600; text-decoration: none;
            display: inline-flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer;
            box-shadow: 0 4px 6px rgba(124, 58, 237, 0.3), inset 0 1px 0 rgba(255,255,255,0.2); transition: transform 0.1s;
        }
        .btn-primary:active { transform: translateY(1px); box-shadow: none; }

        /* MODAL */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
            z-index: 30000; display: none; justify-content: center; align-items: center;
        }
        .modal-content {
            background: #1a1920; width: 90%; max-width: 500px;
            border: 1px solid rgba(139, 92, 246, 0.3); border-radius: 24px;
            padding: 30px; position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .code-block { background: #0f0e13; padding: 15px; border-radius: 8px; font-family: 'Courier New', monospace; font-size: 13px; color: #a1a1aa; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }

        /* MOBILE */
        .sidebar-overlay { display: none; }
        @media (max-width: 768px) {
            .app-container { flex-direction: column; }
            .main-content { margin-left: 0; padding: 20px; padding-top: 0; }
            .sidebar { transform: translateX(-100%); transition: 0.3s; width: 260px; box-shadow: 50px 0 100px rgba(0,0,0,0.8); }
            .sidebar.active { transform: translateX(0); }
            .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 19999; display: none; }
            .sidebar-overlay.active { display: block; }
            .top-header { display: flex; position: sticky; top: 0; z-index: 50; background: rgba(15, 14, 19, 0.85); backdrop-filter: blur(12px); margin: 0 -20px 20px -20px; padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); }
            .mobile-menu-toggle { display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; width: 36px; height: 36px; border-radius: 8px; font-size: 18px; }
            .page-title { display: block; font-size: 16px; font-weight: 700; color: var(--accent-primary); margin-left: 15px; }
            .dataset-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div id="task-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 id="modal-task-title" style="margin-top: 0; color: white;">Problem Title</h2>
            <p id="modal-task-desc" style="color: #a1a1aa; line-height: 1.6; font-size: 14px; margin-bottom: 20px;">
                Description goes here...
            </p>

            <span style="font-size: 11px; color: #666; text-transform: uppercase; margin-bottom: 5px; display: block;">Sample Input</span>
            <div class="code-block" id="modal-task-input">[]</div>

            <span style="font-size: 11px; color: #666; text-transform: uppercase; margin-bottom: 5px; display: block;">Expected Output</span>
            <div class="code-block" id="modal-task-output">value</div>

            <div style="display: flex; gap: 10px;">
                <button onclick="startCoding()" class="btn-primary" style="flex: 1; justify-content: center;">
                    <i class="fa-solid fa-code"></i> &nbsp; Open Editor
                </button>
                <button onclick="closeTaskModal()" class="btn-primary" style="background: transparent; border: 1px solid #333; color: #888; width: 80px; justify-content: center; box-shadow: none;">
                    Close
                </button>
            </div>
        </div>
    </div>

    <div id="mobile-sidebar-overlay" class="sidebar-overlay" onclick="toggleMobileSidebar()"></div>

    <div class="app-container">
        
        <aside class="sidebar" id="mobile-sidebar">
            <div class="brand"><i class="fa-solid fa-dna" style="color: #8b5cf6;"></i> UniBolt.</div>
            
            <div class="nav-menu">
                <a href="/AI" class="nav-item"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
                <a href="/notebooks" class="nav-item"><i class="fa-solid fa-code-branch"></i> Neural Lab</a>
                <a href="/datasets" class="nav-item active"><i class="fa-solid fa-database"></i> Curriculum</a>
                <a href="/aileaderboard" class="nav-item"><i class="fa-solid fa-chart-line"></i> Leaderboard</a>
                <a href="/aigallery" class="nav-item"><i class="fa-solid fa-trophy"></i> Hall of Fame</a>
                <a href="/airesearch" class="nav-item"><i class="fa-solid fa-flask"></i> Research Hub</a>
                <a href="/aicontact" class="nav-item"><i class="fa-solid fa-headset"></i> Support</a>
                <a href="/aiprofile" class="nav-item"><i class="fa-solid fa-sliders"></i> Settings</a>
            </div>

            <div class="sidebar-footer">
                <a href="/login" class="nav-item" style="color: #ef4444;">
                    <i class="fa-solid fa-power-off"></i> Logout
                </a>
            </div>
        </aside>

        <main class="main-content">
            
            <header class="top-header">
                <div style="display: flex; align-items: center;">
                    <button class="mobile-menu-toggle" onclick="toggleMobileSidebar()">
                        <i class="fa-solid fa-bars"></i>
                    </button>
                    <div class="page-title">Daily Curriculum</div>
                </div>
            </header>

            <div class="page-body">
                
                <header style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px;">
                    <div>
                        <h1 class="page-title" style="font-size: 28px; margin: 0; letter-spacing: -0.5px;">Day 1 Curriculum</h1>
                        <p style="color: var(--text-muted); margin-top: 5px; font-size: 14px;">Complete these 6 modules to advance.</p>
                    </div>
                    <div style="text-align: right;">
                        <span style="font-size: 32px; font-weight: 800; color: white; text-shadow: 0 0 20px rgba(139, 92, 246, 0.5);" id="total-count">6</span>
                        <div style="font-size: 11px; color: var(--text-muted); text-transform: uppercase;">Tasks Today</div>
                    </div>
                </header>

                <div class="search-bar">
                    <i class="fa-solid fa-magnifying-glass" style="color: var(--text-muted);"></i>
                    <input type="text" id="search-input" class="search-input" placeholder="Search today's topics...">
                    
                    <select id="filter-select">
                        <option value="all">All Topics</option>
                        <option value="Python Core">Python Core</option>
                        <option value="ML Algorithms">ML Algorithms</option>
                    </select>
                </div>

                <div id="dataset-grid" class="dataset-grid">
                    </div>

            </div>
        </main>
    </div>

    <script>
        // Toggle Mobile Sidebar Logic
        window.toggleMobileSidebar = function() {
            const sidebar = document.getElementById('mobile-sidebar');
            const overlay = document.getElementById('mobile-sidebar-overlay');
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }
    </script>

    <script src="js/datasets.js"></script>
</body>
</html>
