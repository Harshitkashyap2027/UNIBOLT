<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UniBolt - My Profile</title>
    <link rel="icon" type="image/png" href="UniBolt.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        /* --- CORE THEME --- */
        :root { --bg-deep: #09090b; --bg-card: #18181b; --primary: #8b5cf6; --border: rgba(255,255,255,0.08); }
        body { background-color: var(--bg-deep); font-family: 'Outfit', sans-serif; color: #f4f4f5; margin: 0; overflow-x: hidden; }
        .app-container { display: flex; min-height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 260px; height: 100vh; position: fixed; background: #111014; border-right: 1px solid var(--border); padding: 25px 15px; display: flex; flex-direction: column; z-index: 1000; overflow-y: auto; }
        .sidebar::-webkit-scrollbar { display: none; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px; color: #a1a1aa; text-decoration: none; border-radius: 12px; font-weight: 500; margin-bottom: 5px; }
        .nav-item.active { background: rgba(139,92,246,0.15); color: var(--primary); }
        
        /* Main Content */
        .main-content { flex: 1; margin-left: 260px; padding: 30px; padding-bottom: 120px; }
        .bento-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 25px; }
        .bento-card { background: var(--bg-card); border-radius: 24px; padding: 25px; border: 1px solid var(--border); }
        .span-7 { grid-column: span 7; }
        .span-5 { grid-column: span 5; }

        /* Form */
        .form-control { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; padding: 14px; color: white; margin-bottom: 15px; outline: none; }
        .btn-primary { width: 100%; background: white; color: black; border: none; padding: 15px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .avatar-option { width: 50px; height: 50px; border-radius: 14px; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; border: 2px solid transparent; }
        .avatar-option.selected { border-color: var(--primary); background: rgba(139,92,246,0.2); }

        /* --- THEME SELECTOR --- */
        .theme-selector { display: flex; gap: 10px; margin-bottom: 15px; justify-content: center; }
        .theme-dot { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .theme-dot:hover { transform: scale(1.1); }
        .theme-dot.active { border-color: white; transform: scale(1.2); box-shadow: 0 0 10px rgba(255,255,255,0.3); }

        /* Gradients */
        .t-purple { background: linear-gradient(90deg, #8b5cf6, #d4af37); }
        .t-ocean { background: linear-gradient(90deg, #06b6d4, #3b82f6); }
        .t-sunset { background: linear-gradient(90deg, #f43f5e, #f59e0b); }
        .t-forest { background: linear-gradient(90deg, #10b981, #059669); }

        /* --- ID CARD CSS --- */
        .id-container { display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }

        #id-card-visual {
            width: 100%; max-width: 400px;
            aspect-ratio: 1.586 / 1; 
            background: linear-gradient(135deg, #18181b, #09090b);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            overflow: hidden; 
            display: flex; flex-direction: column; 
        }

        .id-header {
            height: 35%; 
            background: linear-gradient(90deg, #8b5cf6, #d4af37); /* Default */
            width: 100%;
            transition: 0.3s ease;
        }

        /* Overlap Trick: Negative Margin */
        .id-avatar-circle {
            width: 80px; height: 80px;
            background: #18181b; 
            border: 4px solid #18181b;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 36px;
            margin: -40px auto 10px auto; 
            position: relative; z-index: 10;
        }

        .id-body {
            flex: 1; 
            display: flex; flex-direction: column;
            text-align: center;
            padding: 0 20px 20px 20px;
        }

        .id-name { font-size: 20px; font-weight: 800; color: white; margin: 0 0 5px 0; }
        .id-college { font-size: 12px; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: auto; }

        .id-footer {
            display: flex; justify-content: space-between;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 12px;
            font-size: 10px; color: #888;
            margin-top: 15px;
        }
        .id-val { color: #fff; font-family: monospace; font-size: 12px; margin-top: 2px; }

        .btn-download-card {
            width: 100%; max-width: 400px;
            background: #27272a; color: white; border: 1px solid var(--border);
            padding: 12px; border-radius: 12px; cursor: pointer; font-size: 14px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        /* Mobile */
        .mobile-header { display: none; margin-bottom: 20px; align-items: center; justify-content: space-between; }
        .menu-btn { background: rgba(255,255,255,0.1); border: none; color: white; width: 40px; height: 40px; border-radius: 12px; font-size: 18px; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 900; display: none; }
        .overlay.active { display: block; }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); width: 280px; }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 20px; }
            .mobile-header { display: flex; }
            .bento-grid { grid-template-columns: 1fr; }
            .span-7, .span-5 { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <div id="sidebar-overlay" class="overlay" onclick="toggleSidebar()"></div>

    <div id="success-modal" style="display:none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #18181b; padding: 40px; border-radius: 20px; text-align: center; border: 1px solid #333; z-index: 2000; box-shadow: 0 20px 50px rgba(0,0,0,0.8);">
        <div style="font-size: 50px; margin-bottom: 20px;">✅</div>
        <h2 style="color: white; margin: 0;">Updated!</h2>
        <button onclick="document.getElementById('success-modal').style.display='none'" class="btn-primary" style="margin-top: 20px;">Awesome</button>
    </div>

    <div class="app-container">
        <aside class="sidebar" id="mobile-sidebar">
            <div style="font-size:22px; font-weight:800; color:white; margin-bottom:30px; padding-left:10px;">UniBolt.</div>
            <div class="nav-menu">
                <a href="/AI" class="nav-item"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
                <a href="/notebooks" class="nav-item"><i class="fa-solid fa-code-branch"></i> Neural Lab</a>
                <a href="/datasets" class="nav-item"><i class="fa-solid fa-database"></i> Datasets</a>
                <a href="/aileaderboard" class="nav-item"><i class="fa-solid fa-chart-line"></i> Leaderboard</a>
                <a href="/aigallery" class="nav-item"><i class="fa-solid fa-trophy"></i> Hall of Fame</a>
                <a href="/airesearch" class="nav-item"><i class="fa-solid fa-flask"></i> Research Hub</a>
                <a href="/aicontact" class="nav-item"><i class="fa-solid fa-headset"></i> Support</a>
                <a href="/aiprofile" class="nav-item active"><i class="fa-solid fa-sliders"></i> Settings</a>
            </div>
            <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid #222;">
                <a href="/login" class="nav-item" style="color:#ef4444;"><i class="fa-solid fa-power-off"></i> Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <div class="mobile-header">
                <button class="menu-btn" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
                <div style="font-weight:700; font-size:18px;">My Profile</div>
                <div style="width:40px;"></div>
            </div>

            <h1 style="margin-top:0;">Account Settings ⚙️</h1>
            <p style="color:#aaa; margin-bottom:30px;">Manage your personal details.</p>

            <div class="bento-grid">
                
                <div class="bento-card span-7">
                    <h3 style="margin-top:0; border-bottom:1px solid #333; padding-bottom:15px; margin-bottom:20px;">Personal Details</h3>
                    <form id="profile-form">
                        <label style="display:block; margin-bottom:10px; font-size:12px; color:#aaa;">CHOOSE AVATAR</label>
                        <div style="display: flex; gap:10px; flex-wrap:wrap; margin-bottom:20px;">
                            <div class="avatar-option selected" onclick="selectAvatar(this, '🐶')">🐶</div>
                            <div class="avatar-option" onclick="selectAvatar(this, '🐱')">🐱</div>
                            <div class="avatar-option" onclick="selectAvatar(this, '🤖')">🤖</div>
                            <div class="avatar-option" onclick="selectAvatar(this, '🦁')">🦁</div>
                            <div class="avatar-option" onclick="selectAvatar(this, '👽')">👽</div>
                        </div>
                        <input type="hidden" id="selected-avatar-val" value="🐶">

                        <label style="display:block; margin-bottom:5px; font-size:12px; color:#aaa;">FULL NAME</label>
                        <input type="text" id="input-name" class="form-control" placeholder="Enter Full Name">

                        <label style="display:block; margin-bottom:5px; font-size:12px; color:#aaa;">COLLEGE / UNIVERSITY</label>
                        <input type="text" id="input-college" class="form-control" placeholder="Enter College Name">

                        <label style="display:block; margin-bottom:5px; font-size:12px; color:#aaa;">EMAIL (Read Only)</label>
                        <input type="text" id="input-email" class="form-control" readonly style="opacity: 0.6; cursor: not-allowed;">

                        <button type="submit" id="save-btn" class="btn-primary">Save Changes</button>
                    </form>
                </div>

                <div class="bento-card span-5" style="background: transparent; border: none; padding: 0; box-shadow: none;">
                    <div class="id-container">
                        
                        <div class="theme-selector">
                            <div class="theme-dot t-purple active" onclick="setCardTheme('purple', this)"></div>
                            <div class="theme-dot t-ocean" onclick="setCardTheme('ocean', this)"></div>
                            <div class="theme-dot t-sunset" onclick="setCardTheme('sunset', this)"></div>
                            <div class="theme-dot t-forest" onclick="setCardTheme('forest', this)"></div>
                        </div>

                        <div id="id-card-visual">
                            <div class="id-header" id="card-header-bg"></div>
                            
                            <div class="id-avatar-circle">
                                <span id="card-icon">🐶</span>
                            </div>

                            <div class="id-body">
                                <h2 class="id-name" id="card-name">Student Name</h2>
                                <p class="id-college" id="card-college">College Name</p>

                                <div class="id-footer">
                                    <div style="text-align:left;">
                                        <div>STUDENT ID</div>
                                        <div class="id-val" id="card-uid">UB-XXXX</div>
                                    </div>
                                    <div style="text-align:right;">
                                        <div>VALID THRU</div>
                                        <div class="id-val">DEC 2026</div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <button onclick="downloadIDCard()" class="btn-download-card">
                            <i class="fa-solid fa-download"></i> Download ID Card
                        </button>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script type="module" src="js/profile-backend.js"></script>

    <script>
        // Toggle Sidebar
        function toggleSidebar() {
            document.getElementById('mobile-sidebar').classList.toggle('active');
            document.getElementById('sidebar-overlay').classList.toggle('active');
        }

        // Avatar Logic
        function selectAvatar(el, emoji) {
            document.querySelectorAll('.avatar-option').forEach(d => d.classList.remove('selected'));
            el.classList.add('selected');
            document.getElementById('selected-avatar-val').value = emoji;
            document.getElementById('card-icon').innerText = emoji;
        }

        // Theme Logic
        function setCardTheme(theme, dot) {
            // UI Active State
            document.querySelectorAll('.theme-dot').forEach(d => d.classList.remove('active'));
            dot.classList.add('active');

            // Apply Color
            const header = document.getElementById('card-header-bg');
            if(theme === 'purple') header.style.background = 'linear-gradient(90deg, #8b5cf6, #d4af37)';
            if(theme === 'ocean') header.style.background = 'linear-gradient(90deg, #06b6d4, #3b82f6)';
            if(theme === 'sunset') header.style.background = 'linear-gradient(90deg, #f43f5e, #f59e0b)';
            if(theme === 'forest') header.style.background = 'linear-gradient(90deg, #10b981, #059669)';
        }

        // Live Typing
        document.getElementById('input-name').addEventListener('input', e => document.getElementById('card-name').innerText = e.target.value || "Student Name");
        document.getElementById('input-college').addEventListener('input', e => document.getElementById('card-college').innerText = e.target.value || "College Name");
    </script>
</body>
</html>
