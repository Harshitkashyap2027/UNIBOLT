<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You are Offline - UniBolt</title>
    <style>
        body { background: #09090b; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; text-align: center; }
        .icon { font-size: 60px; color: #ef4444; margin-bottom: 20px; }
        h1 { margin: 0 0 10px; }
        p { color: #888; margin-bottom: 30px; }
        button { background: #3b82f6; border: none; color: white; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="icon">⚡</div>
    <h1>Connection Lost</h1>
    <p>You are currently offline. Check your internet.</p>
    <button onclick="window.location.reload()">Try Reconnecting</button>
</body>
</html>
