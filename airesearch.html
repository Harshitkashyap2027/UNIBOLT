<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UniBolt - Research Hub</title>
    <link rel="icon" type="image/png" href="UniBolt.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- 1. CORE THEME (Bento / 3D Dark Mode) --- */
        :root {
            --bg-deep: #09090b;
            --bg-card: #18181b;
            --bg-card-hover: #27272a;
            --border: rgba(255, 255, 255, 0.08);
            --primary: #8b5cf6;
            --primary-glow: rgba(139, 92, 246, 0.3);
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --sidebar-width: 260px;
            --shadow-3d: 0 10px 40px -10px rgba(0,0,0,0.5), 
                         0 0 0 1px var(--border) inset,
                         0 20px 25px -5px rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg-deep);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            color: var(--text-main);
            overflow-x: hidden;
            /* Subtle texture */
            background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 24px 24px;
        }

        /* --- 2. LAYOUT & SIDEBAR --- */
        .app-container { display: flex; min-height: 100vh; }

        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            position: fixed;
            left: 0; top: 0;
            background: #111014;
            border-right: 1px solid var(--border);
            padding: 25px 15px;
            display: flex; flex-direction: column;
            z-index: 1000;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .brand { 
            font-size: 22px; font-weight: 800; color: white; margin-bottom: 30px; padding-left: 10px; 
            display: flex; align-items: center; gap: 10px;
        }

        .nav-menu { display: flex; flex-direction: column; gap: 5px; padding: 0; margin: 0; list-style: none; flex: 1; }
        
        .nav-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 16px;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 12px;
            font-size: 14px; font-weight: 500;
            transition: all 0.2s;
        }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: white; transform: translateX(4px); }
        .nav-item.active { background: linear-gradient(90deg, rgba(139, 92, 246, 0.15), transparent); color: var(--primary); border-left: 3px solid var(--primary); }

        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            padding: 30px;
            width: 100%;
        }

        /* --- 3. BENTO SEARCH HERO (iPhone Style) --- */
        .search-hero {
            background: linear-gradient(145deg, #1e1e24, #131316);
            border-radius: 24px;
            padding: 40px 20px;
            text-align: center;
            margin-bottom: 40px;
            position: relative;
            box-shadow: var(--shadow-3d);
            border: 1px solid rgba(255,255,255,0.05);
            overflow: hidden;
        }

        /* Ambient Glow Effect */
        .search-hero::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(139,92,246,0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        .hero-title { font-size: 32px; font-weight: 700; margin: 0 0 10px 0; color: white; letter-spacing: -0.5px; }
        .hero-sub { color: var(--text-muted); margin-bottom: 30px; font-size: 15px; }

        .search-wrapper {
            position: relative; max-width: 500px; margin: 0 auto 25px auto;
        }
        .search-wrapper i {
            position: absolute; left: 20px; top: 50%; transform: translateY(-50%);
            color: #666; font-size: 16px; pointer-events: none;
        }
        .search-input {
            width: 100%;
            padding: 16px 20px 16px 50px;
            background: #000;
            border: 1px solid #333;
            border-radius: 16px;
            color: white; font-size: 15px;
            transition: 0.3s;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }
        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.15), inset 0 2px 4px rgba(0,0,0,0.5);
            outline: none;
        }

        /* iOS Chips / Filters */
        .filter-tags { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .tag-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 13px; font-weight: 500;
            backdrop-filter: blur(10px);
        }
        .tag-btn:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); }
        .tag-btn.active {
            background: white; color: black; border-color: white;
            box-shadow: 0 5px 15px rgba(255,255,255,0.2);
        }

        /* --- 4. 3D RESOURCE GRID --- */
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        .resource-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        /* These classes target the elements generated by your JS */
        .resource-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 25px;
            position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Bouncy spring effect */
            border: 1px solid var(--border);
            display: flex; flex-direction: column;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .resource-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 30px -10px rgba(0,0,0,0.5);
            border-color: rgba(255,255,255,0.2);
            background: var(--bg-card-hover);
            z-index: 10;
        }

        /* Badge Colors */
        .res-badge {
            font-size: 10px; font-weight: 700; text-transform: uppercase;
            padding: 4px 8px; border-radius: 6px; letter-spacing: 0.5px;
            margin-bottom: 15px; display: inline-block;
        }
        .bg-ai { background: rgba(167, 139, 250, 0.15); color: #a78bfa; border: 1px solid rgba(167, 139, 250, 0.3); }
        .bg-web { background: rgba(34, 211, 238, 0.15); color: #22d3ee; border: 1px solid rgba(34, 211, 238, 0.3); }
        .bg-app { background: rgba(244, 114, 182, 0.15); color: #f472b6; border: 1px solid rgba(244, 114, 182, 0.3); }

        .res-title { font-size: 18px; font-weight: 700; color: white; margin-bottom: 8px; line-height: 1.3; }
        .res-desc { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; line-height: 1.6; flex: 1; }

        .res-footer {
            display: flex; justify-content: space-between; align-items: center;
            padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.05);
            margin-top: auto;
        }

        .btn-save {
            background: transparent; border: none; color: #666; font-size: 18px; cursor: pointer; transition: 0.2s;
        }
        .btn-save:hover { color: var(--primary); transform: scale(1.1); }
        .btn-save.saved { color: #f59e0b; }

        .btn-link {
            background: rgba(255,255,255,0.05);
            color: white; text-decoration: none;
            font-size: 12px; font-weight: 600;
            padding: 8px 16px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.2s;
        }
        .btn-link:hover { background: white; color: black; }

        /* --- 5. MOBILE HEADER & RESPONSIVENESS --- */
        .mobile-header { display: none; }
        .overlay { display: none; }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); width: 280px; box-shadow: 20px 0 50px rgba(0,0,0,0.5); }
            .sidebar.active { transform: translateX(0); }
            
            .main-content { margin-left: 0; padding: 20px 15px; }
            
            /* Mobile Top Bar */
            .mobile-header {
                display: flex; align-items: center; justify-content: space-between;
                margin-bottom: 20px; padding-bottom: 10px;
            }
            .menu-btn {
                background: rgba(255,255,255,0.1); border: none; color: white;
                width: 40px; height: 40px; border-radius: 12px;
                font-size: 18px; cursor: pointer;
            }

            /* Overlay for sidebar */
            .overlay {
                position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                background: rgba(0,0,0,0.7); backdrop-filter: blur(5px);
                z-index: 900; opacity: 0; transition: 0.3s; pointer-events: none;
            }
            .overlay.active { display: block; opacity: 1; pointer-events: auto; }

            /* Bento Grid Adjustments */
            .resource-grid { grid-template-columns: 1fr; gap: 20px; }
            .search-hero { padding: 30px 15px; }
            .hero-title { font-size: 26px; }
        }
    </style>
</head>
<body>

    <div id="sidebar-overlay" class="overlay" onclick="toggleSidebar()"></div>

    <div class="app-container">
        
        <aside class="sidebar" id="mobile-sidebar">
            <div class="brand"><i class="fa-solid fa-dna" style="color: #8b5cf6;"></i> UniBolt.</div>
            <ul class="nav-menu">
                <a href="/AI" class="nav-item"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
                <a href="/notebooks" class="nav-item"><i class="fa-solid fa-code"></i> Code Arena</a>
                <a href="/datasets" class="nav-item"><i class="fa-solid fa-database"></i> Practice Zone</a>
                <a href="/aileaderboard" class="nav-item"><i class="fa-solid fa-chart-line"></i> Leaderboard</a>
                <a href="/aigallery" class="nav-item"><i class="fa-solid fa-trophy"></i> Hall of Fame</a>
                <a href="/airesearch" class="nav-item active"><i class="fa-solid fa-flask"></i> Research Hub</a>
                <a href="/aicontact" class="nav-item"><i class="fa-solid fa-headset"></i> Support</a>
                <a href="/aiprofile" class="nav-item"><i class="fa-solid fa-sliders"></i> Settings</a>
            </ul>
            <div style="margin-top:auto; padding-top:20px; border-top:1px solid #222;">
                <a href="/login" class="nav-item" style="color:#ef4444;"><i class="fa-solid fa-power-off"></i> Logout</a>
            </div>
        </aside>

        <main class="main-content">
            
            <div class="mobile-header">
                <button class="menu-btn" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
                <div style="font-weight:700; font-size:18px;">Research Hub</div>
                <div style="width:40px;"></div> </div>

            <div class="search-hero">
                <h1 class="hero-title">Knowledge Base</h1>
                <p class="hero-sub">Access 500+ curated papers, documentation, and tutorials.</p>
                
                <div class="search-wrapper">
                    <i class="fa-solid fa-search"></i>
                    <input type="text" class="search-input" id="search-input" placeholder="Search topics (e.g. 'Neural Networks')...">
                </div>

                <div class="filter-tags" id="filter-container">
                    <button class="tag-btn active" data-filter="all">All</button>
                    <button class="tag-btn" data-filter="ai">🤖 AI & Data</button>
                    <button class="tag-btn" data-filter="web">💻 Web Dev</button>
                    <button class="tag-btn" data-filter="app">📱 App Dev</button>
                    <button class="tag-btn" data-filter="saved">⭐ Saved</button>
                </div>
            </div>

            <div class="page-body">
                <div class="section-header">
                    <h3 style="color:white; margin:0; font-size: 20px;">Latest Resources</h3>
                    <span style="font-size:13px; color:#666;">Showing <span id="res-count">0</span> items</span>
                </div>

                <div id="resource-grid" class="resource-grid">
                    <div style="color:#666; grid-column: 1/-1; text-align:center; padding:40px;">
                        <i class="fa-solid fa-circle-notch fa-spin" style="font-size:24px; margin-bottom:10px;"></i><br>
                        Loading Library...
                    </div>
                </div>
            </div>

        </main>
    </div>

</body>
