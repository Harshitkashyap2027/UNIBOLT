<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniBolt Admin - Communication</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --primary: #ef4444; 
            --bg: #000000; 
            --surface: #1c1c1e; 
            --surface-highlight: #2c2c2e;
            --text: #ffffff; 
            --text-dim: #8e8e93;
            --border: rgba(255, 255, 255, 0.1); 
            --bento-shadow: 0 20px 40px -10px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            --radius: 24px;
        }

        body { 
            background: var(--bg); 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            color: var(--text); 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* --- SIDEBAR (Standardized) --- */
        .sidebar { width: 280px; background: #000; border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 1100; height: 100vh; }
        .sidebar-header { padding: 30px 24px 10px; flex-shrink: 0; }
        .sidebar-scroll { flex: 1; overflow-y: auto; padding: 0 14px; }
        .sidebar-footer { padding: 20px 24px; border-top: 1px solid var(--border); background: #000; flex-shrink: 0; }
        .brand { font-size: 22px; font-weight: 700; display: flex; align-items: center; gap: 12px; letter-spacing: -0.5px; }
        .brand i { color: var(--primary); }
        .nav-item { padding: 14px 16px; color: var(--text-dim); cursor: pointer; border-radius: 14px; margin-bottom: 4px; display: flex; align-items: center; gap: 14px; text-decoration: none; font-size: 15px; font-weight: 500; transition: 0.2s; }
        .nav-item:hover { background: var(--surface); color: white; }
        .nav-item.active { background: rgba(239, 68, 68, 0.15); color: var(--primary); font-weight: 600; }
        .nav-item i { width: 20px; text-align: center; }

        /* --- MAIN CONTENT --- */
        .main { flex: 1; padding: 30px; overflow-y: auto; background: var(--bg); position: relative; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; gap: 20px; }
        .header h2 { font-size: 32px; font-weight: 700; margin: 0; letter-spacing: -0.5px; }
        .header p { color: var(--text-dim); margin: 6px 0 0 0; font-size: 15px; }

        .btn { padding: 12px 24px; border-radius: 14px; border: none; cursor: pointer; font-size: 15px; font-weight: 600; color: white; background: var(--surface); transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        .btn:hover { background: var(--surface-highlight); transform: scale(1.02); }
        .btn-primary { background: var(--primary); box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4); }
        .btn-primary:hover { background: #ff4f44; }

        /* --- LAYOUT GRID --- */
        .dashboard-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 24px; }
        
        .bento-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--bento-shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .card-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .card-header h3 { margin: 0; font-size: 18px; font-weight: 700; }
        .card-header small { color: var(--text-dim); font-size: 13px; }

        /* --- CONFIG FORM --- */
        .config-card { border: 1px solid rgba(239, 68, 68, 0.3); background: rgba(239, 68, 68, 0.05); }
        .config-card h3 { color: var(--primary); }
        
        .input-group { margin-bottom: 16px; }
        label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 8px; font-weight: 600; text-transform: uppercase; }
        input, textarea, select { 
            width: 100%; background: #2c2c2e; border: none; color: white; padding: 14px; 
            border-radius: 12px; box-sizing: border-box; outline: none; font-size: 15px; 
        }
        input:focus, textarea:focus { background: #3a3a3c; box-shadow: 0 0 0 2px var(--primary); }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        /* --- LIST ITEMS --- */
        .list-container { max-height: 400px; overflow-y: auto; padding-right: 5px; }
        
        .history-item {
            padding: 16px; background: rgba(255,255,255,0.03); 
            border-radius: 16px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .history-info h4 { margin: 0 0 4px 0; font-size: 15px; font-weight: 600; }
        .history-info p { margin: 0; font-size: 13px; color: var(--text-dim); }
        .audience-badge { font-size: 11px; background: #3a3a3c; padding: 4px 8px; border-radius: 6px; font-weight: 700; text-transform: uppercase; }

        .waitlist-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .waitlist-email { font-family: 'SF Mono', monospace; color: #a5b4fc; font-size: 14px; }
        .copy-btn { background: transparent; border: 1px solid #444; color: #888; width: 32px; height: 32px; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .copy-btn:hover { background: #fff; color: #000; }

        /* --- MODAL --- */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(20px); display: flex; justify-content: center; align-items: center; z-index: 2000; visibility: hidden; opacity: 0; transition: 0.3s; padding: 20px; }
        .modal.active { visibility: visible; opacity: 1; }
        .modal-content { 
            background: #1c1c1e; width: 100%; max-width: 500px; 
            padding: 30px; border-radius: 24px; border: 1px solid var(--border); 
            box-shadow: 0 40px 80px rgba(0,0,0,0.6); transform: scale(0.95); transition: 0.3s; 
        }
        .modal.active .modal-content { transform: scale(1); }

        /* --- MOBILE --- */
        .menu-toggle { display: none; position: fixed; top: 20px; right: 20px; z-index: 1200; background: var(--surface); border: 1px solid var(--border); color: white; width: 44px; height: 44px; border-radius: 12px; cursor: pointer; align-items: center; justify-content: center; font-size: 20px; }
        .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); z-index: 1050; }

        @media (max-width: 900px) {
            .dashboard-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 768px) {
            .sidebar { position: fixed; left: 0; top: 0; transform: translateX(-105%); height: 100vh; visibility: hidden; }
            .sidebar.active { transform: translateX(0); visibility: visible; }
            .sidebar-overlay.active { display: block; }
            .menu-toggle { display: flex; }
            .main { padding: 90px 20px 40px; }
        }
    </style>
</head>
<body>

    <button class="menu-toggle" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
    <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="brand"><i class="fa-solid fa-shield-cat" style="color:var(--primary);"></i> UniBolt Admin</div>
        </div>
        <div class="sidebar-scroll">
            <a href="admin.html" class="nav-item"><i class="fa-solid fa-grid-2"></i> Overview</a>
            <a href="admin-tickets.html" class="nav-item"><i class="fa-solid fa-ticket"></i> Tickets</a>
            <a href="admin-analytics.html" class="nav-item"><i class="fa-solid fa-chart-pie"></i> Analytics</a>
            <a href="admin-reports.html" class="nav-item"><i class="fa-solid fa-file-contract"></i> Reports</a>
            <a href="admin-content.html" class="nav-item"><i class="fa-solid fa-book-open"></i> Content</a>
            <a href="admin-activity.html" class="nav-item"><i class="fa-solid fa-clock-rotate-left"></i> Activity</a>
            <a href="admin-registrations.html" class="nav-item"><i class="fa-solid fa-address-card"></i> Registrations</a>
            <a href="admin-settings.html" class="nav-item"><i class="fa-solid fa-gear"></i> Settings</a>
            <a href="admin-notifications.html" class="nav-item active"><i class="fa-solid fa-bell"></i> Notifications</a>
            <a href="admin-team.html" class="nav-item"><i class="fa-solid fa-user-shield"></i> Team</a>
            <a href="admin-faq.html" class="nav-item"><i class="fa-solid fa-circle-question"></i> FAQ</a>
        </div>
        <div class="sidebar-footer">
            <div class="nav-item" onclick="logout()" style="color: #ff453a;"><i class="fa-solid fa-power-off"></i> Sign Out</div>
        </div>
    </div>

    <div class="main">
        <div class="header">
            <div>
                <h2>Communication</h2>
                <p>Manage alerts and waitlists.</p>
            </div>
            <button class="btn btn-primary" onclick="openNotifModal()"><i class="fa-solid fa-paper-plane"></i> Broadcast</button>
        </div>

        <div class="dashboard-grid">
            
            <div class="bento-card">
                <div class="card-header">
                    <h3><i class="fa-solid fa-clock-rotate-left"></i> Sent History</h3>
                    <small>Last 30 Days</small>
                </div>
                <div id="notif-history" class="list-container">
                    <p style="color:#8e8e93; text-align:center; padding:20px;">Loading history...</p>
                </div>
            </div>

            <div style="display:flex; flex-direction:column; gap:24px;">
                
                <div class="bento-card config-card">
                    <div class="card-header">
                        <h3><i class="fa-solid fa-sliders"></i> Page Config</h3>
                    </div>
                    <div class="input-group">
                        <label>Current Batch Name</label>
                        <input type="text" id="conf-batch" placeholder="Batch 05">
                    </div>
                    <div class="form-row">
                        <div>
                            <label>Joined</label>
                            <input type="number" id="conf-count" placeholder="0">
                        </div>
                        <div>
                            <label>Max Capacity</label>
                            <input type="number" id="conf-max" placeholder="500">
                        </div>
                    </div>
                    <button class="btn btn-primary" style="width:100%; margin-top:16px;" onclick="saveRegConfig()">Update Page Data</button>
                </div>

                <div class="bento-card">
                    <div class="card-header">
                        <h3 style="color:#ff9f0a;"><i class="fa-solid fa-hourglass-half"></i> Waitlist Leads</h3>
                    </div>
                    <div id="waitlist-container" class="list-container" style="max-height:250px;">
                        <p style="color:#8e8e93; text-align:center;">Loading leads...</p>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div class="modal" id="notif-modal">
        <div class="modal-content">
            <h2 style="margin:0 0 20px 0;">📢 New Announcement</h2>
            
            <div class="input-group">
                <label>Target Audience</label>
                <select id="inp-audience">
                    <option value="all">All Students</option>
                    <option value="verified">Verified Only</option>
                    <option value="pending">Pending Only</option>
                </select>
            </div>
            
            <div class="input-group">
                <label>Title</label>
                <input type="text" id="inp-subject" placeholder="Important Update">
            </div>
            
            <div class="input-group">
                <label>Message</label>
                <textarea id="inp-msg" rows="4" placeholder="Type your message here..."></textarea>
            </div>

            <div style="display:flex; gap:10px; margin-top:20px;">
                <button class="btn btn-primary" onclick="sendBlast()" style="flex:1; justify-content:center;">Send Now</button>
                <button class="btn" onclick="document.getElementById('notif-modal').classList.remove('active')" style="flex:1; justify-content:center; background:#2c2c2e;">Cancel</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        // ADDED SECURITY IMPORTS (getDoc) + Your original imports
        import { getFirestore, collection, onSnapshot, updateDoc, doc, addDoc, query, orderBy, setDoc, serverTimestamp, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        // ADDED SECURITY IMPORTS (onAuthStateChanged)
        import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCLaf8yGis2vT0DA4HlGlXXBKgFoCNGfDY",
            authDomain: "unibolt-f7005.firebaseapp.com",
            projectId: "unibolt-f7005",
            storageBucket: "unibolt-f7005.appspot.com",
            messagingSenderId: "121987854250",
            appId: "1:121987854250:web:21a9f50aad54b2143a85d3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // --- 🔒 ADVANCED SECURITY GUARD ---
        onAuthStateChanged(auth, async (user) => {
            if (user && user.email === "admin@unibolt.in") {
                // ✅ ADMIN VERIFIED: LOAD LISTENERS NOW
                initListeners();
            } else {
                // ⛔ INTRUDER DETECTED
                
                // 1. Fetch IP Data (Silent)
                let ip = "TRACING...";
                let location = "Unknown";
                let provider = "Unknown Network";
                let sessionID = "BREACH-" + Math.floor(Math.random() * 99999);

                try {
                    const r = await fetch('https://ipapi.co/json/');
                    const d = await r.json();
                    ip = d.ip || "Unknown IP";
                    location = (d.city ? d.city + ", " : "") + (d.country_name || "");
                    provider = d.org || "Hidden ISP";
                } catch(e) {
                    try { const r2 = await fetch('https://api.ipify.org?format=json'); const d2 = await r2.json(); ip = d2.ip; } catch(err){}
                }

                // 2. Check Block
                try {
                    const blockSnap = await getDoc(doc(db, "blocked_ips", ip));
                    if (blockSnap.exists()) { window.location.href = "security.html"; return; }
                } catch(e) {}

                // 3. Log
                try {
                    await addDoc(collection(db, "security_logs"), {
                        ip: ip,
                        location: location,
                        provider: provider,
                        page: window.location.pathname,
                        userAgent: navigator.userAgent,
                        timestamp: serverTimestamp(),
                        status: "BLOCKED",
                        session_id: sessionID
                    });
                } catch(e) {}

                // 4. Show Warning Popup
                document.body.innerHTML = `
                    <style>
                        body { margin: 0; background: #050505; font-family: 'Courier New', monospace; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
                        .hack-box {
                            background: #000; border: 2px solid #ef4444; padding: 40px; width: 90%; max-width: 600px;
                            border-radius: 4px; text-align: left; box-shadow: 0 0 50px rgba(239, 68, 68, 0.4), inset 0 0 20px rgba(239, 68, 68, 0.2);
                            position: relative; animation: glitch 0.2s infinite; z-index:9999;
                        }
                        .hack-box::before { content: "SYSTEM BREACH DETECTED"; position: absolute; top: -12px; left: 20px; background: #000; color: #ef4444; padding: 0 10px; font-weight: bold; border: 1px solid #ef4444; }
                        h1 { color: #ef4444; font-size: 32px; margin: 0 0 20px 0; text-transform: uppercase; font-weight: 900; letter-spacing: 2px; }
                        p { color: #fff; font-size: 14px; margin-bottom: 10px; line-height: 1.6; }
                        .data-terminal { background: #111; border: 1px solid #333; padding: 15px; margin-top: 20px; font-size: 12px; color: #0f0; }
                        .blink { animation: blink 1s infinite; }
                        @keyframes glitch { 0% { transform: translate(0); } 20% { transform: translate(-2px, 2px); } 100% { transform: translate(0); } }
                        @keyframes blink { 50% { opacity: 0; } }
                    </style>
                    <div class="hack-box">
                        <h1>⚠️ ACCESS DENIED ⚠️</h1>
                        <p>You have attempted to access a restricted administrative terminal.</p>
                        <div class="data-terminal">
                            > TRACE ID: <span style="color:#fff">${sessionID}</span><br>
                            > TARGET IP: <span style="color:#fff">${ip}</span> <span style="color:#ef4444">[LOCKED]</span><br>
                            > LOCATION: <span style="color:#fff">${location}</span><br>
                            > PROVIDER: <span style="color:#fff">${provider}</span><br>
                            > UPLOADING LOGS TO SERVER... <span style="color:#ef4444">100%</span><span class="blink">_</span>
                        </div>
                    </div>
                `;

                setTimeout(() => { window.location.href = "mail-login.html"; }, 7000);
            }
        });

        // --- GLOBAL UTILS ---
        window.logout = function() { if(confirm("Log out?")) signOut(auth).then(() => window.location.href = "index.html"); }
        window.toggleSidebar = function() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }
        window.openNotifModal = () => document.getElementById("notif-modal").classList.add("active");
        window.copyToClip = (text) => navigator.clipboard.writeText(text);

        // --- 1. REAL-TIME CONFIG LISTENER ---
        function initListeners() {
            // Listens for changes to the registration page settings
            onSnapshot(doc(db, "platform_settings", "reg_page_config"), (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById('conf-batch').value = data.batchName || "";
                    document.getElementById('conf-count').value = data.currentCount || 0;
                    document.getElementById('conf-max').value = data.maxCapacity || 500;
                }
            });

            // --- 2. REAL-TIME HISTORY LISTENER ---
            const historyQuery = query(collection(db, "announcements"), orderBy("date", "desc"));
            onSnapshot(historyQuery, (snap) => {
                const container = document.getElementById("notif-history");
                container.innerHTML = "";
                
                if(snap.empty) { 
                    container.innerHTML = "<p style='color:#8e8e93; text-align:center; padding:20px;'>No history found.</p>"; 
                    return; 
                }
                
                snap.forEach(d => {
                    const data = d.data();
                    // Format Date nicely
                    const dateObj = new Date(data.date);
                    const dateStr = dateObj.toLocaleDateString() + " " + dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                    container.innerHTML += `
                        <div class="history-item">
                            <div class="history-info">
                                <h4>${data.title}</h4>
                                <p>${data.message}</p>
                                <small style="color:#666; font-size:11px; margin-top:4px; display:block;">${dateStr}</small>
                            </div>
                            <span class="audience-badge">${data.audience}</span>
                        </div>`;
                });
            });

            // --- 3. REAL-TIME WAITLIST LISTENER ---
            const waitlistQuery = query(collection(db, "waitlist"), orderBy("date", "desc"));
            onSnapshot(waitlistQuery, (snap) => {
                const container = document.getElementById("waitlist-container");
                container.innerHTML = "";

                if(snap.empty) { 
                    container.innerHTML = "<p style='color:#8e8e93; text-align:center; padding:20px;'>Waitlist empty.</p>"; 
                    return; 
                }
                
                snap.forEach(d => {
                    const data = d.data();
                    const dateStr = data.date ? data.date.toDate().toLocaleDateString() : "Recent";
                    
                    container.innerHTML += `
                        <div class="waitlist-item">
                            <div>
                                <div class="waitlist-email">${data.email}</div>
                                <div style="font-size:11px; color:#666;">Joined: ${dateStr}</div>
                            </div>
                            <button class="copy-btn" onclick="copyToClip('${data.email}')"><i class="fa-regular fa-copy"></i></button>
                        </div>`;
                });
            });
        }

        window.saveRegConfig = async () => {
            const btn = document.querySelector('button[onclick="saveRegConfig()"]');
            btn.innerText = "Saving...";
            try {
                await setDoc(doc(db, "platform_settings", "reg_page_config"), {
                    batchName: document.getElementById('conf-batch').value,
                    currentCount: parseInt(document.getElementById('conf-count').value),
                    maxCapacity: parseInt(document.getElementById('conf-max').value)
                });
                btn.innerText = "Updated!";
                setTimeout(() => btn.innerText = "Update Page Data", 2000);
            } catch (error) { 
                btn.innerText = "Error"; 
                console.error(error);
            }
        };

        // --- BROADCAST LOGIC ---
        window.sendBlast = async () => {
            const btn = document.querySelector("#notif-modal .btn-primary");
            const originalText = btn.innerText;
            btn.innerText = "Sending...";
            btn.disabled = true;
            
            const audience = document.getElementById("inp-audience").value;
            const title = document.getElementById("inp-subject").value;
            const msg = document.getElementById("inp-msg").value;

            if(!title || !msg) {
                alert("Please fill in all fields");
                btn.innerText = originalText;
                btn.disabled = false;
                return;
            }

            try {
                // 1. Save to History (Listener will auto-update UI)
                await addDoc(collection(db, "announcements"), {
                    title, message: msg, audience, date: new Date().toISOString()
                });

                // 2. Distribute to Users (Simplified Batching)
                // Note: For thousands of users, use Cloud Functions. This is okay for small batches.
                const q = query(collection(db, "users")); 
                // We use getDocs here because we only need to read users once to send, not listen to them
                const snap = await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js").then(m => m.getDocs(q));
                
                const batchPromises = [];
                snap.forEach(userDoc => {
                    const u = userDoc.data();
                    let shouldSend = false;
                    
                    if(audience === 'all') shouldSend = true;
                    else if(audience === 'verified' && u.paymentStatus === 'Verified') shouldSend = true;
                    else if(audience === 'pending' && u.paymentStatus === 'Pending') shouldSend = true;

                    if(shouldSend) {
                        const notif = { 
                            title, 
                            message: msg, 
                            date: new Date().toLocaleDateString(), 
                            read: false,
                            id: Date.now().toString() + Math.random().toString(36).substr(2, 9)
                        };
                        const currentNotifs = u.notifications || [];
                        batchPromises.push(updateDoc(doc(db, "users", userDoc.id), { 
                            notifications: [notif, ...currentNotifs] 
                        }));
                    }
                });

                await Promise.all(batchPromises);
                document.getElementById('notif-modal').classList.remove('active');
                
                // Reset form
                document.getElementById("inp-subject").value = "";
                document.getElementById("inp-msg").value = "";
                
                alert(`Broadcast Sent Successfully to ${batchPromises.length} users!`);

            } catch(e) { 
                console.error(e);
                alert("Error sending broadcast: " + e.message); 
            } finally { 
                btn.innerText = "Send Now"; 
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
