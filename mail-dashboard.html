<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UniBolt Admin - Overview</title>
    
    <link rel="manifest" href="mail-manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/732/732200.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root { 
            --primary: #ef4444; 
            --bg: #09090b; 
            --surface: #121212; 
            --border: #27272a; 
            --text: #e4e4e7; 
            --radius: 20px; 
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR */
        .sidebar { width: 280px; background: #000; border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 100; transition: transform 0.3s ease; }
        .sidebar-header { padding: 30px 24px 20px; }
        .brand { font-size: 22px; font-weight: 800; display: flex; align-items: center; gap: 10px; color: white; letter-spacing: -0.5px; }
        
        .nav-link { 
            display: flex; align-items: center; gap: 12px; 
            padding: 14px 24px; color: #a1a1aa; text-decoration: none; 
            font-weight: 600; transition: 0.2s; border-left: 3px solid transparent; font-size: 15px; 
        }
        .nav-link i { width: 20px; text-align: center; }
        .nav-link:hover { color: white; background: rgba(255,255,255,0.03); }
        .nav-link.active { border-left-color: var(--primary); background: rgba(239, 68, 68, 0.08); color: var(--primary); }

        /* MAIN */
        .main { flex: 1; padding: 30px; overflow-y: auto; height: 100vh; position: relative; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header h2 { font-size: 28px; font-weight: 800; margin: 0; color: white; }
        
        .header-actions { display: flex; gap: 10px; align-items: center; }

        .refresh-btn { background: var(--surface); border: 1px solid var(--border); color: white; width: 40px; height: 40px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .refresh-btn:hover { background: #27272a; }
        .spin { animation: spin 1s linear infinite; }

        /* PWA INSTALL BUTTON */
        .install-btn {
            display: none; 
            background: var(--primary); color: white; border: none;
            padding: 0 16px; height: 40px; border-radius: 12px;
            font-weight: 700; cursor: pointer; align-items: center; gap: 8px;
            font-size: 14px; transition: 0.2s;
        }
        .install-btn:hover { background: #dc2626; transform: translateY(-2px); }

        /* STATS GRID */
        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 20px; 
            margin-bottom: 30px; 
        }
        
        .stat-card { 
            background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; 
            position: relative; transition: transform 0.2s; display: flex; align-items: center; gap: 20px;
        }
        .stat-card:hover { transform: translateY(-3px); border-color: #333; }
        
        .stat-icon { width: 56px; height: 56px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
        .stat-content { display: flex; flex-direction: column; }
        .stat-val { font-size: 28px; font-weight: 800; color: white; line-height: 1.2; }
        .stat-label { font-size: 13px; font-weight: 600; color: #a1a1aa; text-transform: uppercase; letter-spacing: 0.5px; }

        /* CHARTS & FEED */
        .charts-wrapper { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 30px; }
        .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; height: 400px; }

        .activity-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; }
        .activity-item { display: flex; align-items: center; gap: 15px; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .activity-item:last-child { border-bottom: none; }
        
        .act-icon { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; color: white; background: #27272a; }
        .act-info h4 { margin: 0 0 4px; font-size: 14px; font-weight: 600; color: white; }
        .act-info p { margin: 0; font-size: 12px; color: #a1a1aa; }
        .act-time { margin-left: auto; font-size: 12px; color: #71717a; font-weight: 600; white-space: nowrap; }

        /* COLORS */
        .bg-blue { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }
        .bg-green { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .bg-orange { background: rgba(245, 158, 11, 0.1); color: #f59e0b; }
        .bg-purple { background: rgba(139, 92, 246, 0.1); color: #8b5cf6; }
        .bg-gold { background: rgba(234, 179, 8, 0.1); color: #eab308; }
        .bg-cyan { background: rgba(6, 182, 212, 0.1); color: #06b6d4; }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* MOBILE OPTIMIZATIONS */
        .menu-toggle { display: none; position: fixed; top: 20px; right: 20px; z-index: 1200; background: var(--surface); border: 1px solid var(--border); color: white; width: 44px; height: 44px; border-radius: 12px; cursor: pointer; align-items: center; justify-content: center; font-size: 20px; }
        .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 90; }

        @media (max-width: 900px) { 
            .main { padding: 90px 20px 40px; }
            .charts-wrapper { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
            .stat-card { padding: 16px; flex-direction: column; align-items: flex-start; gap: 10px; }
            .stat-icon { width: 40px; height: 40px; font-size: 18px; border-radius: 12px; }
            .stat-val { font-size: 22px; }
            .stat-label { font-size: 11px; }
            .sidebar { position: fixed; left: 0; top: 0; transform: translateX(-105%); height: 100vh; }
            .sidebar.active { transform: translateX(0); }
            .sidebar-overlay.active { display: block; }
            .menu-toggle { display: flex; }
            .install-btn span { display: none; } 
        }
    </style>
</head>
<body>

    <button class="menu-toggle" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
    <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="brand"><i class="fa-solid fa-envelope-ribbon" style="color: #ff0000;"></i>> UniBolt Mail</div>
        </div>
        <div style="flex:1; overflow-y:auto; padding:0 14px;">
            <a href="mail-dashboard.html" class="nav-link active"><i class="fa-solid fa-chart-pie"></i> Overview</a>
            <a href="mail-contacts.html" class="nav-link"><i class="fa-solid fa-users"></i> Directory</a>
            <a href="tracking.html" class="nav-link"><i class="fa-solid fa-shield-cat"></i> Security Logs</a>
            <a href="mail-settings.html" class="nav-link"><i class="fa-solid fa-gear"></i> Settings</a>
        </div>
        <div style="padding: 20px;">
            <div class="nav-link" onclick="logout()" style="color:#ef4444; cursor:pointer;"><i class="fa-solid fa-power-off"></i> Sign Out</div>
        </div>
    </div>

    <div class="main">
        <div class="header">
            <div>
                <h2>Dashboard</h2>
                <p style="color:#a1a1aa; font-size:14px; margin:5px 0 0;">Live platform statistics.</p>
            </div>
            
            <div class="header-actions">
                <button id="installApp" class="install-btn">
                    <i class="fa-solid fa-download"></i> <span>Install App</span>
                </button>
                <button class="refresh-btn" onclick="refreshData()"><i class="fa-solid fa-rotate-right" id="ref-icon"></i></button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon bg-blue"><i class="fa-solid fa-users"></i></div>
                <div class="stat-content"><div class="stat-val" id="val-students">...</div><div class="stat-label">Total Students</div></div>
            </div>
            <div class="stat-card">
                <div class="stat-icon bg-green"><i class="fa-solid fa-paper-plane"></i></div>
                <div class="stat-content"><div class="stat-val" id="val-today">...</div><div class="stat-label">Emails (Today)</div></div>
            </div>
            <div class="stat-card">
                <div class="stat-icon bg-orange"><i class="fa-solid fa-fire"></i></div>
                <div class="stat-content"><div class="stat-val" id="val-active">...</div><div class="stat-label">Active (Streak > 1)</div></div>
            </div>
            <div class="stat-card">
                <div class="stat-icon bg-purple"><i class="fa-solid fa-envelope-open-text"></i></div>
                <div class="stat-content"><div class="stat-val" id="val-total-emails">...</div><div class="stat-label">Total Sent</div></div>
            </div>
            <div class="stat-card">
                <div class="stat-icon bg-gold"><i class="fa-solid fa-crown"></i></div>
                <div class="stat-content"><div class="stat-val" id="val-pro">...</div><div class="stat-label">Pro Members</div></div>
            </div>
            <div class="stat-card">
                <div class="stat-icon bg-cyan"><i class="fa-solid fa-chart-line"></i></div>
                <div class="stat-content"><div class="stat-val" id="val-avg-streak">...</div><div class="stat-label">Avg. Engagement</div></div>
            </div>
        </div>

        <div class="charts-wrapper">
            <div class="chart-card">
                <h3 style="margin:0 0 20px; color:white; font-size:16px;">Student Growth (Real Data)</h3>
                <canvas id="growthChart"></canvas>
            </div>
            <div class="chart-card">
                <h3 style="margin:0 0 20px; color:white; font-size:16px;">Engagement</h3>
                <canvas id="pieChart"></canvas>
            </div>
        </div>

        <div class="activity-card">
            <h3 style="margin:0 0 20px; color:white; font-size:18px;">Recent Signups</h3>
            <div id="activity-feed">
                <p style="color:#666;">Loading data...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        // FIXED IMPORTS FOR SECURITY SYSTEM
        import { getFirestore, collection, onSnapshot, query, orderBy, limit, getDocs, addDoc, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCLaf8yGis2vT0DA4HlGlXXBKgFoCNGfDY",
            authDomain: "unibolt-f7005.firebaseapp.com",
            projectId: "unibolt-f7005",
            storageBucket: "unibolt-f7005.appspot.com",
            messagingSenderId: "121987854250",
            appId: "1:121987854250:web:21a9f50aad54b2143a85d3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // --- 🔒 THE SECURITY GUARD ---
        onAuthStateChanged(auth, async (user) => {
            if (user && user.email === "admin@unibolt.in") {
                // ✅ ADMIN VERIFIED
                loadData(); 
                loadFeed();
            } else {
                // ⛔ INTRUDER DETECTED
                
                // 1. Get Data (Silent)
                let ip = "TRACING...";
                let location = "Unknown";
                let provider = "Unknown Network";
                let sessionID = "BREACH-" + Math.floor(Math.random() * 99999);

                try {
                    // Try Fetching Detailed Data
                    const r = await fetch('https://ipapi.co/json/');
                    const d = await r.json();
                    ip = d.ip || "Unknown IP";
                    location = (d.city ? d.city + ", " : "") + (d.country_name || "");
                    provider = d.org || "ISP Hidden";
                } catch(e) {
                    try {
                        const r2 = await fetch('https://api.ipify.org?format=json');
                        const d2 = await r2.json();
                        ip = d2.ip;
                    } catch(err){}
                }

                // 2. CHECK IF PERMANENTLY BLOCKED
                try {
                    const blockSnap = await getDoc(doc(db, "blocked_ips", ip));
                    if (blockSnap.exists()) {
                        window.location.href = "security.html"; // Send to jail
                        return;
                    }
                } catch(e) {}

                // 3. LOG INCIDENT
                try {
                    await addDoc(collection(db, "security_logs"), {
                        ip: ip,
                        location: location,
                        provider: provider,
                        page: window.location.pathname,
                        userAgent: navigator.userAgent,
                        timestamp: serverTimestamp(),
                        status: "BLOCKED",
                        session_id: sessionID
                    });
                } catch(e) { console.error("Logging Error:", e); }

                // 4. SHOW HACKER POPUP
                document.body.innerHTML = `
                    <style>
                        body { margin: 0; background: #050505; font-family: 'Courier New', monospace; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
                        .hack-card {
                            background: #000; border: 2px solid #ef4444; width: 90%; max-width: 550px; padding: 40px;
                            box-shadow: 0 0 60px rgba(239, 68, 68, 0.4); text-align: left; position: relative; animation: shake 0.3s;
                        }
                        h1 { color: #ef4444; font-size: 28px; margin: 0 0 15px 0; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #ef4444; padding-bottom: 15px; }
                        p { color: #fff; font-size: 14px; line-height: 1.6; margin-bottom: 25px; }
                        .terminal { background: #111; border: 1px solid #333; padding: 20px; font-size: 12px; color: #0f0; margin-top: 10px; }
                        .blink { animation: blink 1s infinite; }
                        .red { color: #ef4444; font-weight: bold; }
                        .white { color: #fff; }
                        @keyframes shake { 0% { transform: translate(1px, 1px) rotate(0deg); } 10% { transform: translate(-1px, -2px) rotate(-1deg); } 20% { transform: translate(-3px, 0px) rotate(1deg); } 30% { transform: translate(3px, 2px) rotate(0deg); } 40% { transform: translate(1px, -1px) rotate(1deg); } 50% { transform: translate(-1px, 2px) rotate(-1deg); } 60% { transform: translate(-3px, 1px) rotate(0deg); } 70% { transform: translate(3px, 1px) rotate(-1deg); } 80% { transform: translate(-1px, -1px) rotate(1deg); } 90% { transform: translate(1px, 2px) rotate(0deg); } 100% { transform: translate(1px, -2px) rotate(-1deg); } }
                        @keyframes blink { 50% { opacity: 0; } }
                    </style>
                    <div class="hack-card">
                        <h1>⛔ ACCESS DENIED</h1>
                        <p>Unauthorized access attempt detected. You do not have the required administrative privileges to view this terminal.</p>
                        <p>Your digital footprint has been captured and flagged for security review.</p>
                        
                        <div class="terminal">
                            > SESSION ID: <span class="white">${sessionID}</span><br>
                            > TARGET IP: <span class="white">${ip}</span> <span class="red">[LOCKED]</span><br>
                            > LOCATION: <span class="white">${location}</span><br>
                            > PROVIDER: <span class="white">${provider}</span><br>
                            > DEVICE: <span class="white">${navigator.platform}</span><br>
                            > STATUS: <span class="red">CONNECTION TERMINATED</span><span class="blink">_</span>
                        </div>
                    </div>
                `;

                // 5. Force Redirect
                setTimeout(() => { window.location.href = "index.html"; }, 7000);
            }
        });

        // --- PWA INSTALLATION LOGIC ---
        let deferredPrompt;
        const installBtn = document.getElementById('installApp');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); 
            deferredPrompt = e;
            installBtn.style.display = 'flex'; 
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    installBtn.style.display = 'none'; 
                }
                deferredPrompt = null;
            }
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/mail-sw.js')
                .then(() => console.log("SW Registered"))
                .catch(err => console.log("SW Fail", err));
        }

        // --- 1. LOAD STATISTICS ---
        async function loadData() {
            const icon = document.getElementById('ref-icon');
            icon.classList.add('spin');

            try {
                const usersSnap = await getDocs(collection(db, "users"));
                const totalStudents = usersSnap.size;
                let activeLearners = 0, totalStreak = 0, proCount = 0, monthlyGrowth = {}; 
                usersSnap.forEach(doc => {
                    const data = doc.data();
                    const streak = parseInt(data.streak || 0);
                    if (streak >= 2) activeLearners++;
                    totalStreak += streak;
                    if (data.xp > 1000 || data.enrolledProgram) proCount++;
                    let date = data.createdAt ? data.createdAt.toDate() : new Date(); 
                    const month = date.toLocaleString('default', { month: 'short' });
                    monthlyGrowth[month] = (monthlyGrowth[month] || 0) + 1;
                });
                document.getElementById('val-students').innerText = totalStudents;
                document.getElementById('val-active').innerText = activeLearners;
                document.getElementById('val-pro').innerText = proCount;
                document.getElementById('val-avg-streak').innerText = totalStudents > 0 ? (totalStreak / totalStudents).toFixed(1) + "d" : "0d";

                const emailSnap = await getDocs(collection(db, "sent_emails"));
                let emailsToday = 0; const todayStr = new Date().toDateString(); 
                emailSnap.forEach(doc => {
                    const data = doc.data();
                    if (data.timestamp && data.timestamp.toDate().toDateString() === todayStr) emailsToday++;
                });
                document.getElementById('val-total-emails').innerText = emailSnap.size;
                document.getElementById('val-today').innerText = emailsToday;

                renderGrowthChart(monthlyGrowth); renderPieChart(activeLearners, totalStudents);
            } catch (e) { console.error(e); } finally { icon.classList.remove('spin'); }
        }

        // --- 2. ACTIVITY FEED ---
        function loadFeed() {
            const q = query(collection(db, "users"), orderBy("createdAt", "desc"), limit(5)); 
            onSnapshot(q, (snap) => {
                const feed = document.getElementById('activity-feed'); feed.innerHTML = "";
                if(snap.empty) { feed.innerHTML = "<p style='color:#666'>No recent activity.</p>"; return; }
                snap.forEach(doc => {
                    const u = doc.data();
                    let dateStr = "Recent";
                    if (u.createdAt) { const date = u.createdAt.toDate(); dateStr = date.toDateString() === new Date().toDateString() ? date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : date.toLocaleDateString(); }
                    feed.innerHTML += `<div class="activity-item"><div class="act-icon"><i class="fa-solid fa-user-plus"></i></div><div class="act-info"><h4>${u.name || 'New Student'}</h4><p>${u.email}</p></div><div class="act-time">${dateStr}</div></div>`;
                });
            }, (err) => { const fallbackQ = query(collection(db, "users"), limit(5)); onSnapshot(fallbackQ, (snap) => {}); });
        }

        // --- 3. CHARTS ---
        let chart1, chart2;
        function renderGrowthChart(dataObj) {
            const ctx = document.getElementById('growthChart').getContext('2d');
            if(chart1) chart1.destroy();
            chart1 = new Chart(ctx, { type: 'line', data: { labels: Object.keys(dataObj), datasets: [{ label: 'New Students', data: Object.values(dataObj), borderColor: '#ef4444', backgroundColor: 'rgba(239, 68, 68, 0.1)', fill: true, tension: 0.4 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#333' } }, x: { grid: { display: false } } } } });
        }
        function renderPieChart(active, total) {
            const ctx = document.getElementById('pieChart').getContext('2d');
            if(chart2) chart2.destroy();
            chart2 = new Chart(ctx, { type: 'doughnut', data: { labels: ['Active', 'Inactive'], datasets: [{ data: [active, total - active], backgroundColor: ['#f59e0b', '#333'], borderWidth: 0 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { color: '#fff' } } } } });
        }

        window.refreshData = loadData;
        window.toggleSidebar = () => { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }
        window.logout = () => { if(confirm("Log out?")) signOut(auth).then(() => window.location.href = "index.html"); }
    </script>
</body>
</html>
