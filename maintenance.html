<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Maintenance | UniBolt</title>
    <link rel="icon" type="image/png" href="UniBolt.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #f59e0b; /* Amber/Orange */
            --primary-glow: rgba(245, 158, 11, 0.4);
            --bg-dark: #050505;
            --glass-bg: rgba(20, 20, 23, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            /* Subtle grid background */
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--text-main);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Ambient Glow Behind Card */
        .glow-effect {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--primary);
            filter: blur(150px);
            opacity: 0.15;
            border-radius: 50%;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 10;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 60px 40px;
            border-radius: 24px;
            text-align: center;
            max-width: 480px;
            width: 90%;
            border: 1px solid var(--border-color);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Animated Icon Container */
        .icon-wrapper {
            position: relative;
            width: 80px;
            height: 80px;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.2), rgba(245, 158, 11, 0.05));
            border-radius: 20px;
            transform: rotate(45deg);
            box-shadow: 0 0 20px var(--primary-glow);
            animation: pulse 3s infinite ease-in-out;
        }

        .icon-wrapper i {
            font-size: 32px;
            color: var(--primary);
            z-index: 2;
            filter: drop-shadow(0 0 10px rgba(245, 158, 11, 0.5));
            animation: spinSlow 8s linear infinite;
        }

        h1 {
            margin: 0 0 12px 0;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #fff, #ccc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-muted);
            line-height: 1.6;
            font-size: 15px;
            margin-bottom: 40px;
            font-weight: 400;
        }

        /* Status Pill */
        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.2);
            border-radius: 100px;
            font-size: 12px;
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 25px;
        }
        .status-dot {
            width: 6px;
            height: 6px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--primary);
            animation: blink 2s infinite;
        }

        /* Buttons */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background-color: white;
            color: black;
            text-decoration: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            cursor: pointer;
            border: none;
            width: 100%;
            box-sizing: border-box;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.1);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border-color: rgba(255, 255, 255, 0.1);
        }

        /* Animations */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes spinSlow { 100% { transform: rotate(360deg); } }
        @keyframes pulse { 
            0% { transform: rotate(45deg) scale(1); opacity: 0.8; }
            50% { transform: rotate(45deg) scale(1.05); opacity: 1; }
            100% { transform: rotate(45deg) scale(1); opacity: 0.8; }
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    </style>
</head>
<body>

    <div class="glow-effect"></div>

    <div class="container">
        <div class="status-pill">
            <span class="status-dot"></span>
            System Maintenance
        </div>

        <div class="icon-wrapper">
            <div class="icon-bg"></div>
            <i class="fa-solid fa-screwdriver-wrench"></i>
        </div>

        <h1>We'll be back soon</h1>
        <p>
            UniBolt is currently undergoing scheduled maintenance to improve performance. 
            We apologize for the inconvenience.
        </p>

        <div class="btn-group">
            <button onclick="checkStatus()" class="btn" id="retry-btn">
                <i class="fa-solid fa-rotate-right"></i> Check Status
            </button>
            
            <button onclick="contactSupport()" class="btn btn-secondary">
                <i class="fa-brands fa-whatsapp"></i> Contact Support
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCLaf8yGis2vT0DA4HlGlXXBKgFoCNGfDY",
            authDomain: "unibolt-f7005.firebaseapp.com",
            projectId: "unibolt-f7005",
            storageBucket: "unibolt-f7005.appspot.com",
            messagingSenderId: "121987854250",
            appId: "1:121987854250:web:21a9f50aad54b2143a85d3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 1. WhatsApp Redirection Logic
        window.contactSupport = () => {
            const phoneNumber = "919258837596";
            const message = "Hello Admin, I am seeing the Maintenance Page. Is the server down?";
            const url = `https://wa.me/${phoneNumber}?text=${encodeURIComponent(message)}`;
            window.open(url, '_blank');
        };

        // 2. Check Status Logic
        window.checkStatus = async () => {
            const btn = document.getElementById('retry-btn');
            const originalHTML = btn.innerHTML;
            
            // Show Loading
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Connecting...';
            btn.style.opacity = "0.8";

            try {
                const docRef = doc(db, "platform_settings", "config");
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const maintenanceMode = docSnap.data().maintenanceMode;

                    if (maintenanceMode === false) {
                        // Success!
                        btn.innerHTML = '<i class="fa-solid fa-check"></i> Online! Redirecting...';
                        btn.style.background = "#10b981"; // Green
                        btn.style.color = "white";
                        setTimeout(() => {
                            window.location.href = "dashboard.html";
                        }, 1000);
                    } else {
                        // Still Offline
                        setTimeout(() => {
                            btn.innerHTML = originalHTML;
                            btn.style.opacity = "1";
                            // Subtle shake animation for feedback
                            btn.animate([
                                { transform: 'translateX(0)' },
                                { transform: 'translateX(-5px)' },
                                { transform: 'translateX(5px)' },
                                { transform: 'translateX(0)' }
                            ], { duration: 300 });
                        }, 800);
                    }
                }
            } catch (error) {
                console.error("Error:", error);
                btn.innerHTML = originalHTML;
                btn.style.opacity = "1";
            }
        };
    </script>
</body>
</html>
